<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 蘋果網盤</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* ===== 樣式與之前一樣，省略重複 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            position: relative;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #adminSecretBtn {
            position: absolute;
            top: 4px;
            right: 0;
            width: 32px;
            height: 32px;
            background: #f0f2f7;
            border: 1px solid #e8ecf2;
            border-radius: 6px;
            cursor: pointer;
            color: #d0d4dc;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0.6;
        }
        .upload-area {
            border: 2px dashed #d0d8e6;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin: 16px 0;
        }
        .upload-area:hover {
            border-color: #1e5ef7;
            background: #f8faff;
        }
        .upload-area .icon {
            font-size: 48px;
            color: #1e5ef7;
        }
        .upload-area p {
            color: #888;
            margin-top: 8px;
        }
        #fileInput {
            display: none;
        }
        #status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
        }
        #status.show {
            display: block;
        }
        #status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .upload-success {
            background: #e8f5e9;
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            border: 1px solid #a5d6a7;
            display: none;
        }
        .upload-success.show {
            display: block;
        }
        .upload-success .file-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .upload-success .file-name {
            font-weight: 600;
            font-size: 16px;
        }
        .upload-success .file-meta {
            color: #555;
            font-size: 14px;
        }
        .upload-success .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-success .actions button {
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-download {
            background: #1e5ef7;
            color: white;
        }
        .btn-copy {
            background: #e0e7ff;
            color: #1e5ef7;
        }
        .btn-close {
            background: transparent;
            color: #888;
            border: 1px solid #ccc;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 8px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-info {
            flex: 1;
            min-width: 120px;
        }
        .file-name {
            font-weight: 500;
        }
        .file-meta {
            font-size: 13px;
            color: #888;
        }
        .file-actions button {
            padding: 4px 12px;
            background: #1e5ef7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .file-actions .delete-btn {
            background: #e74c3c;
        }
        .short-link {
            font-size: 12px;
            color: #1e5ef7;
            background: #f0f4ff;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            word-break: break-all;
        }
        .empty-state {
            color: #888;
            text-align: center;
            padding: 20px 0;
        }
        .file-count {
            font-size: 14px;
            color: #888;
            margin: 12px 0 4px;
        }
        .download-page {
            text-align: center;
            padding: 30px 20px;
        }
        .download-page .icon {
            font-size: 80px;
        }
        .download-page h2 {
            margin: 16px 0;
        }
        .download-page p {
            color: #888;
        }
        .download-page .btn-download-big {
            display: inline-block;
            margin-top: 20px;
            padding: 16px 48px;
            background: #1e5ef7;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(30, 94, 247, 0.3);
            text-decoration: none;
        }
        .debug-box {
            background: #1a1a2e;
            color: #00ff88;
            font-family: monospace;
            font-size: 13px;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 16px 0;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .debug-box.error {
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }
        .debug-box.success {
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        .debug-box.info {
            color: #4fc3f7;
            border: 1px solid #4fc3f7;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .modal-box h2 {
            margin-bottom: 16px;
        }
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #d0d8e6;
            border-radius: 12px;
            font-size: 16px;
        }
        .modal-box button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: #1e5ef7;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-box .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .modal-box .error-msg.show {
            display: block;
        }
        .admin-badge {
            display: none;
            background: #e74c3c;
            color: white;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 10px;
        }
        .admin-badge.show {
            display: inline-block;
        }
        .exit-admin-btn {
            margin-left: 10px;
            background: transparent;
            border: 1px solid #ccc;
            padding: 2px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            color: #555;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 600px) {
            #adminSecretBtn {
                width: 28px;
                height: 28px;
                font-size: 12px;
                top: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- 主界面 -->
        <div id="mainUI">
            <h1>
                🍎 蘋果網盤
                <span class="admin-badge" id="adminBadge">👑 管理員</span>
                <button class="exit-admin-btn" id="exitAdminBtn" style="display:none;" onclick="exitAdmin()">退出管理</button>
            </h1>
            <p class="subtitle">📤 完全公開 · 無需登入 · 即傳即用</p>

            <button id="adminSecretBtn" aria-label="管理入口" onclick="adminSecretClick()">🔑</button>

            <div id="status"></div>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📤</div>
                <p>點擊或拖曳上傳檔案</p>
                <p style="font-size:13px; color:#aaa;">所有檔案類型 · 無大小限制</p>
            </div>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)" />

            <div class="upload-success" id="uploadSuccess">
                <div class="file-info">
                    <span style="font-size:24px;">✅</span>
                    <div>
                        <div class="file-name" id="successFileName">檔案名稱</div>
                        <div class="file-meta" id="successFileMeta">大小 · 下載次數</div>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-download" id="successDownloadBtn" onclick="downloadSuccessFile()">⬇️ 下載</button>
                    <button class="btn-copy" id="successCopyBtn" onclick="copySuccessLink()">📋 複製分享連結</button>
                    <button class="btn-close" onclick="document.getElementById('uploadSuccess').classList.remove('show')">✕ 關閉</button>
                </div>
            </div>

            <div class="file-count" id="fileCount">📁 共 0 個檔案</div>
            <div id="fileList">
                <div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>
            </div>
        </div>

        <!-- 下載頁面 -->
        <div id="downloadUI" style="display:none;">
            <div class="download-page">
                <div class="icon" id="downloadIcon">📄</div>
                <h2 id="downloadFileName">檔案名稱</h2>
                <p id="downloadFileMeta">大小 · 公開分享</p>
                <button class="btn-download-big" id="directDownloadBtn" onclick="directDownload()">⬇️ 立即下載</button>
                <p style="margin-top:12px;font-size:14px;color:#888;">⚡ 全速下載 · 無需登入</p>
                <div id="debugBox" class="debug-box"></div>
                <a href="#" id="backHomeLink" style="display:inline-block;margin-top:16px;color:#1e5ef7;text-decoration:none;">← 返回首頁</a>
            </div>
        </div>
    </div>

    <!-- 管理員登入模態框 -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h2>🔐 管理員登入</h2>
            <input type="text" id="adminUser" placeholder="帳號" value="admin">
            <input type="password" id="adminPass" placeholder="密碼" value="7891">
            <button onclick="adminLogin()">登入</button>
            <p class="error-msg" id="adminError">帳號或密碼錯誤</p>
            <button onclick="document.getElementById('adminModal').classList.remove('show')" style="background:#ccc;color:#333;margin-top:8px;">取消</button>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. Supabase 設定
        // ============================================================
        const SUPABASE_URL = 'https://mpygxmnugiknpqlkzczm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_JHvmzxxmPDCyP7PH9eYtzQ_GWOBVHPS';
        const BUCKET = 'files';

        if (typeof supabase === 'undefined') {
            alert('❌ Supabase SDK 載入失敗，請檢查網路！');
            throw new Error('SDK 未載入');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isAdmin = false;
        let adminClickCount = 0;
        let adminClickTimer = null;
        let lastUploaded = { fileName: '', fileSize: 0, downloadURL: '', shortLink: '' };
        let currentDownloadFileName = '';

        // ============================================================
        // 2. 🔥 核心下載函數（絕不跳轉，強制下載）
        // ============================================================
        async function downloadFileDirect(url, fileName) {
            // 如果沒有副檔名，從 URL 猜測
            if (!fileName || fileName === '') {
                const urlParts = url.split('/');
                const lastPart = urlParts[urlParts.length - 1];
                if (lastPart.includes('.')) {
                    fileName = lastPart;
                } else {
                    fileName = '下載檔案';
                }
            }

            // 顯示下載中狀態
            const btns = document.querySelectorAll('button');
            let targetBtn = null;
            for (let btn of btns) {
                if (btn.textContent.includes('下載') || btn.textContent.includes('下載')) {
                    // 粗略尋找
                }
            }
            // 我們用全域變數記錄按鈕
            window._downloadBtn = document.activeElement;

            try {
                // 顯示下載中
                if (window._downloadBtn) {
                    window._downloadBtn.textContent = '⏳ 下載中...';
                    window._downloadBtn.disabled = true;
                }

                // 使用 fetch 獲取檔案 (blob)
                const response = await fetch(url, {
                    // 可以加入 mode: 'cors' 確保跨域
                });
                if (!response.ok) {
                    throw new Error('下載失敗 (HTTP ' + response.status + ')');
                }

                // 獲取檔案內容
                const blob = await response.blob();

                // 創建本地 URL
                const objectURL = URL.createObjectURL(blob);

                // 建立 a 標籤觸發下載
                const a = document.createElement('a');
                a.href = objectURL;
                a.download = fileName; // 強制下載，不會預覽
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // 釋放記憶體
                setTimeout(() => {
                    URL.revokeObjectURL(objectURL);
                }, 5000);

                // 還原按鈕
                if (window._downloadBtn) {
                    window._downloadBtn.textContent = '✅ 已下載';
                    setTimeout(() => {
                        window._downloadBtn.textContent = '⬇️ 下載';
                        window._downloadBtn.disabled = false;
                    }, 1500);
                }
            } catch (err) {
                alert('下載失敗: ' + err.message);
                console.error(err);
                if (window._downloadBtn) {
                    window._downloadBtn.textContent = '⬇️ 下載';
                    window._downloadBtn.disabled = false;
                }
            }
        }

        // ============================================================
        // 3. 工具函數
        // ============================================================
        function showStatus(text, type = 'info') {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'show ' + type;
        }

        function copyLink(link) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    alert('✅ 連結已複製！\n' + link);
                }).catch(() => prompt('請手動複製：', link));
            } else {
                prompt('請手動複製：', link);
            }
        }

        // ============================================================
        // 4. 上傳功能
        // ============================================================
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            showStatus('⏳ 上傳中...', 'info');
            document.getElementById('uploadArea').style.opacity = '0.6';

            try {
                const ext = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
                const filePath = `public/${fileName}`;

                const { error: uploadError } = await supabaseClient.storage
                    .from(BUCKET)
                    .upload(filePath, file, { cacheControl: '3600', upsert: false });

                if (uploadError) throw uploadError;

                const { data: urlData } = supabaseClient.storage
                    .from(BUCKET)
                    .getPublicUrl(filePath);

                const downloadURL = urlData.publicUrl;
                const shortCode = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
                const shortLink = window.location.origin + window.location.pathname + '?download=' + shortCode;

                const { error: dbError } = await supabaseClient
                    .from('files')
                    .insert({
                        file_name: file.name,
                        file_size: file.size,
                        file_type: file.type || 'unknown',
                        download_url: downloadURL,
                        short_code: shortCode,
                        uploader: 'public',
                        uploader_email: '公開上傳'
                    });

                if (dbError) throw dbError;

                lastUploaded = { fileName: file.name, fileSize: file.size, downloadURL, shortLink };

                const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                document.getElementById('successFileName').textContent = file.name;
                document.getElementById('successFileMeta').textContent = `${sizeMB} MB · 剛剛上傳`;
                document.getElementById('uploadSuccess').classList.add('show');

                showStatus('✅ 上傳成功！', 'success');
                loadFileList();

            } catch (err) {
                showStatus('❌ 上傳失敗: ' + err.message, 'error');
                alert('上傳失敗: ' + err.message);
            } finally {
                document.getElementById('uploadArea').style.opacity = '1';
                document.getElementById('fileInput').value = '';
            }
        }

        function downloadSuccessFile() {
            if (lastUploaded.downloadURL) {
                downloadFileDirect(lastUploaded.downloadURL, lastUploaded.fileName);
            } else {
                alert('沒有可下載的檔案');
            }
        }

        function copySuccessLink() {
            if (lastUploaded.shortLink) copyLink(lastUploaded.shortLink);
            else alert('沒有可複製的連結');
        }

        // ============================================================
        // 5. 載入檔案列表
        // ============================================================
        async function loadFileList() {
            try {
                const { data, error } = await supabaseClient
                    .from('files')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                document.getElementById('fileCount').textContent = `📁 共 ${data?.length || 0} 個檔案`;

                const container = document.getElementById('fileList');
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>`;
                    return;
                }

                let html = '';
                data.forEach(f => {
                    const sizeMB = (f.file_size / 1024 / 1024).toFixed(1);
                    const shortLink = window.location.origin + window.location.pathname + '?download=' + f.short_code;
                    const time = f.created_at ? new Date(f.created_at).toLocaleDateString() : '';

                    html += `
                        <div class="file-item">
                            <div class="file-info">
                                <div class="file-name">📄 ${f.file_name}</div>
                                <div class="file-meta">${sizeMB} MB · ${f.download_count || 0} 次下載 · ${time}</div>
                                <div class="short-link">🔗 ${shortLink}</div>
                            </div>
                            <div class="file-actions">
                                <button onclick="copyLink('${shortLink}')">📋 複製</button>
                                <button onclick="downloadFileDirect('${f.download_url}', '${f.file_name}')">⬇️ 下載</button>
                                ${isAdmin ? `<button class="delete-btn" onclick="deleteFile('${f.id}', '${f.download_url}')">🗑️ 刪除</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                document.getElementById('fileList').innerHTML = `<p style="color:red;">載入失敗: ${err.message}</p>`;
            }
        }

        async function deleteFile(id, downloadURL) {
            if (!confirm('確定要刪除這個檔案嗎？此動作無法復原！')) return;
            try {
                const urlParts = downloadURL.split('/');
                const filePath = urlParts.slice(urlParts.indexOf('files') + 1).join('/');
                await supabaseClient.storage.from(BUCKET).remove([filePath]);
                await supabaseClient.from('files').delete().eq('id', id);
                showStatus('🗑️ 檔案已刪除', 'success');
                loadFileList();
            } catch (err) {
                alert('刪除失敗: ' + err.message);
            }
        }

        // ============================================================
        // 6. 管理員功能
        // ============================================================
        function adminSecretClick() {
            adminClickCount++;
            clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000);
            if (adminClickCount >= 3) {
                adminClickCount = 0;
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminError').classList.remove('show');
                document.getElementById('adminUser').value = 'admin';
                document.getElementById('adminPass').value = '7891';
                document.getElementById('adminPass').focus();
            }
        }

        function adminLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if (user === 'admin' && pass === '7891') {
                document.getElementById('adminModal').classList.remove('show');
                isAdmin = true;
                document.getElementById('adminBadge').classList.add('show');
                document.getElementById('exitAdminBtn').style.display = 'inline-block';
                showStatus('👑 管理員模式已啟用', 'success');
                loadFileList();
            } else {
                document.getElementById('adminError').classList.add('show');
            }
        }

        function exitAdmin() {
            isAdmin = false;
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('exitAdminBtn').style.display = 'none';
            showStatus('已退出管理員模式', 'info');
            loadFileList();
        }

        // ============================================================
        // 7. 分享連結處理（短碼查詢）
        // ============================================================
        async function handleShareLink() {
            const params = new URLSearchParams(window.location.search);
            const shortCode = params.get('download');
            const debugBox = document.getElementById('debugBox');

            if (!shortCode) {
                document.getElementById('mainUI').style.display = 'block';
                document.getElementById('downloadUI').style.display = 'none';
                return;
            }

            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('downloadUI').style.display = 'block';

            debugBox.style.display = 'block';
            debugBox.className = 'debug-box info';
            debugBox.textContent = `🔍 查詢短碼: ${shortCode}\n⏳ 正在查詢資料庫...`;

            try {
                const { data, error } = await supabaseClient
                    .from('files')
                    .select('*')
                    .eq('short_code', shortCode)
                    .maybeSingle();

                if (error || !data) {
                    debugBox.className = 'debug-box error';
                    debugBox.textContent = `❌ 找不到短碼: ${shortCode}\n可能原因：檔案已被刪除，或短碼複製錯誤。\n資料庫回傳: ${error ? error.message : '無資料'}`;
                    document.getElementById('downloadFileName').textContent = '❌ 檔案不存在';
                    document.getElementById('downloadFileMeta').textContent = '連結可能已過期';
                    document.getElementById('directDownloadBtn').style.display = 'none';
                    document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
                    return;
                }

                debugBox.className = 'debug-box success';
                debugBox.textContent = `✅ 找到檔案: ${data.file_name}\n短碼: ${shortCode}\n上傳者: ${data.uploader_email || '公開'}`;

                // 更新下載次數
                supabaseClient
                    .from('files')
                    .update({ download_count: (data.download_count || 0) + 1 })
                    .eq('id', data.id)
                    .then();

                const sizeMB = (data.file_size / 1024 / 1024).toFixed(1);
                document.getElementById('downloadFileName').textContent = data.file_name;
                document.getElementById('downloadFileMeta').textContent = `${sizeMB} MB · 公開分享 · 下載 ${data.download_count || 0} 次`;
                document.getElementById('directDownloadBtn').style.display = 'inline-block';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;

                window._downloadURL = data.download_url;
                window._downloadFileName = data.file_name;

            } catch (err) {
                debugBox.className = 'debug-box error';
                debugBox.textContent = `❌ 載入失敗: ${err.message}`;
                document.getElementById('downloadFileName').textContent = '❌ 載入失敗';
                document.getElementById('downloadFileMeta').textContent = err.message;
                document.getElementById('directDownloadBtn').style.display = 'none';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
            }
        }

        function directDownload() {
            if (window._downloadURL && window._downloadFileName) {
                downloadFileDirect(window._downloadURL, window._downloadFileName);
            } else {
                alert('無法下載，請重新整理頁面');
            }
        }

        // ============================================================
        // 8. 拖曳支援
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#1e5ef7';
                this.style.background = '#f0f4ff';
            });
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = '#d0d8e6';
                this.style.background = 'transparent';
            });
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '#d0d8e6';
                this.style.background = 'transparent';
                if (e.dataTransfer.files.length > 0) {
                    document.getElementById('fileInput').files = e.dataTransfer.files;
                    handleFileSelect({ target: document.getElementById('fileInput') });
                }
            });
        });

        // ============================================================
        // 9. 啟動
        // ============================================================
        window.onload = function() {
            handleShareLink();
            const params = new URLSearchParams(window.location.search);
            if (!params.get('download')) {
                loadFileList();
                showStatus('✅ 就緒', 'success');
            }
        };

        console.log('🍎 蘋果網盤 - 強制下載版（100%不跳轉）');
    </script>
</body>
</html>
