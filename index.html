<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 蘋果網盤</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            position: relative;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #adminSecretBtn {
            position: absolute;
            top: 4px;
            right: 0;
            width: 32px;
            height: 32px;
            background: #f0f2f7;
            border: 1px solid #e8ecf2;
            border-radius: 6px;
            cursor: pointer;
            color: #d0d4dc;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0.6;
        }
        .upload-area {
            border: 2px dashed #d0d8e6;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin: 16px 0;
        }
        .upload-area:hover {
            border-color: #1e5ef7;
            background: #f8faff;
        }
        .upload-area .icon {
            font-size: 48px;
            color: #1e5ef7;
        }
        .upload-area p {
            color: #888;
            margin-top: 8px;
        }
        #fileInput {
            display: none;
        }
        #status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
        }
        #status.show {
            display: block;
        }
        #status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .upload-success {
            background: #e8f5e9;
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            border: 1px solid #a5d6a7;
            display: none;
        }
        .upload-success.show {
            display: block;
        }
        .upload-success .file-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .upload-success .file-name {
            font-weight: 600;
            font-size: 16px;
        }
        .upload-success .file-meta {
            color: #555;
            font-size: 14px;
        }
        .upload-success .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-success .actions button {
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-download {
            background: #1e5ef7;
            color: white;
        }
        .btn-copy {
            background: #e0e7ff;
            color: #1e5ef7;
        }
        .btn-close {
            background: transparent;
            color: #888;
            border: 1px solid #ccc;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 8px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-info {
            flex: 1;
            min-width: 120px;
        }
        .file-name {
            font-weight: 500;
        }
        .file-meta {
            font-size: 13px;
            color: #888;
        }
        .file-actions button {
            padding: 4px 12px;
            background: #1e5ef7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .file-actions .delete-btn {
            background: #e74c3c;
        }
        .short-link {
            font-size: 12px;
            color: #1e5ef7;
            background: #f0f4ff;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            word-break: break-all;
        }
        .empty-state {
            color: #888;
            text-align: center;
            padding: 20px 0;
        }
        .file-count {
            font-size: 14px;
            color: #888;
            margin: 12px 0 4px;
        }
        .download-page {
            text-align: center;
            padding: 50px 20px;
            font-family: system-ui;
            max-width: 600px;
            margin: 0 auto;
        }
        .download-page .icon {
            font-size: 80px;
        }
        .download-page h2 {
            margin: 16px 0;
        }
        .download-page p {
            color: #888;
        }
        .download-page .btn-download-big {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 48px;
            background: #1e5ef7;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(30, 94, 247, 0.3);
            text-decoration: none;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .modal-box h2 {
            margin-bottom: 16px;
            color: #1a1a2e;
        }
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #d0d8e6;
            border-radius: 12px;
            font-size: 16px;
        }
        .modal-box button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: #1e5ef7;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-box .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .modal-box .error-msg.show {
            display: block;
        }
        .admin-badge {
            display: none;
            background: #e74c3c;
            color: white;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 10px;
        }
        .admin-badge.show {
            display: inline-block;
        }
        .exit-admin-btn {
            margin-left: 10px;
            background: transparent;
            border: 1px solid #ccc;
            padding: 2px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            color: #555;
        }
        .hidden {
            display: none !important;
        }
        #debugPanel {
            background: #1a1a2e;
            color: #00ff88;
            font-family: monospace;
            font-size: 13px;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 12px 0;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }
        #debugPanel.show {
            display: block;
        }
        #debugPanel .error {
            color: #ff6b6b;
        }
        #debugPanel .success {
            color: #00ff88;
        }
        #debugPanel .info {
            color: #4fc3f7;
        }
        @media (max-width: 600px) {
            #adminSecretBtn {
                width: 28px;
                height: 28px;
                font-size: 12px;
                top: 2px;
            }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ============================================================
        // 1. Supabase 設定
        // ============================================================
        const SUPABASE_URL = 'https://mpygxmnugiknpqlkzczm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_JHvmzxxmPDCyP7PH9eYtzQ_GWOBVHPS';
        const BUCKET = 'files';

        if (typeof supabase === 'undefined') {
            document.getElementById('app').innerHTML = '<h2>❌ SDK 載入失敗</h2>';
            throw new Error('SDK 未載入');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 2. 工具函數
        // ============================================================
        function debugLog(msg) {
            console.log(msg);
        }

        function downloadFile(url) {
            window.open(url, '_blank');
        }

        function copyLink(link) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    alert('✅ 連結已複製！\n' + link);
                }).catch(() => prompt('請手動複製：', link));
            } else {
                prompt('請手動複製：', link);
            }
        }

        // ============================================================
        // 3. 顯示下載頁面（獨立）
        // ============================================================
        async function showDownloadPage(shortCode) {
            debugLog('🔍 查詢短碼: ' + shortCode);

            try {
                const { data, error } = await supabaseClient
                    .from('files')
                    .select('*')
                    .eq('short_code', shortCode)
                    .single();

                if (error || !data) {
                    debugLog('❌ 短碼不存在');
                    document.getElementById('app').innerHTML = `
                        <div class="container">
                            <div class="download-page">
                                <div class="icon">❌</div>
                                <h2>檔案不存在</h2>
                                <p>連結可能已過期或已被刪除</p>
                                <a href="${window.location.origin + window.location.pathname}" style="display:inline-block;margin-top:20px;padding:12px 24px;background:#1e5ef7;color:white;border-radius:30px;text-decoration:none;">返回首頁</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                debugLog('✅ 找到檔案: ' + data.file_name);

                // 更新下載次數（非同步）
                supabaseClient
                    .from('files')
                    .update({ download_count: (data.download_count || 0) + 1 })
                    .eq('id', data.id)
                    .then();

                const sizeMB = (data.file_size / 1024 / 1024).toFixed(1);

                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="download-page">
                            <div class="icon">📄</div>
                            <h2>${data.file_name}</h2>
                            <p>${sizeMB} MB · 公開分享</p>
                            <button id="directDownloadBtn" class="btn-download-big">
                                ⬇️ 立即下載
                            </button>
                            <p style="margin-top:12px;font-size:14px;color:#888;">⚡ 全速下載 · 無需登入</p>
                        </div>
                    </div>
                `;

                document.getElementById('directDownloadBtn').addEventListener('click', function() {
                    downloadFile(data.download_url);
                });

            } catch (err) {
                debugLog('❌ 載入失敗: ' + err.message);
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="download-page">
                            <div class="icon">❌</div>
                            <h2>載入失敗</h2>
                            <p>${err.message}</p>
                            <a href="${window.location.origin + window.location.pathname}" style="display:inline-block;margin-top:20px;padding:12px 24px;background:#1e5ef7;color:white;border-radius:30px;text-decoration:none;">返回首頁</a>
                        </div>
                    </div>
                `;
            }
        }

        // ============================================================
        // 4. 載入主頁面
        // ============================================================
        async function loadMainPage() {
            debugLog('📋 載入主頁面');
            const app = document.getElementById('app');

            app.innerHTML = `
                <div class="container" id="mainContainer">
                    <h1>
                        🍎 蘋果網盤
                        <span class="admin-badge" id="adminBadge">👑 管理員</span>
                        <button class="exit-admin-btn" id="exitAdminBtn" style="display:none;">退出管理</button>
                    </h1>
                    <p class="subtitle">📤 完全公開 · 無需登入 · 即傳即用</p>

                    <button id="adminSecretBtn" aria-label="管理入口">🔑</button>

                    <div id="status"></div>

                    <div class="upload-area" id="uploadArea">
                        <div class="icon">📤</div>
                        <p>點擊或拖曳上傳檔案</p>
                        <p style="font-size:13px; color:#aaa;">所有檔案類型 · 無大小限制</p>
                    </div>
                    <input type="file" id="fileInput" />

                    <div class="upload-success" id="uploadSuccess">
                        <div class="file-info">
                            <span style="font-size:24px;">✅</span>
                            <div>
                                <div class="file-name" id="successFileName">檔案名稱</div>
                                <div class="file-meta" id="successFileMeta">大小 · 下載次數</div>
                            </div>
                        </div>
                        <div class="actions">
                            <button id="successDownloadBtn" class="btn-download">⬇️ 下載</button>
                            <button id="successCopyBtn" class="btn-copy">📋 複製分享連結</button>
                            <button id="successCloseBtn" class="btn-close">✕ 關閉</button>
                        </div>
                    </div>

                    <div class="file-count" id="fileCount">📁 共 0 個檔案</div>
                    <div id="fileList">
                        <div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>
                    </div>
                </div>
            `;

            // ============================================================
            // 重新綁定主頁事件（因為 innerHTML 重置了 DOM）
            // ============================================================
            const statusEl = document.getElementById('status');
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const fileList = document.getElementById('fileList');
            const fileCount = document.getElementById('fileCount');
            const uploadSuccess = document.getElementById('uploadSuccess');
            const successFileName = document.getElementById('successFileName');
            const successFileMeta = document.getElementById('successFileMeta');
            const successDownloadBtn = document.getElementById('successDownloadBtn');
            const successCopyBtn = document.getElementById('successCopyBtn');
            const successCloseBtn = document.getElementById('successCloseBtn');
            const adminSecretBtn = document.getElementById('adminSecretBtn');
            const adminBadge = document.getElementById('adminBadge');
            const exitAdminBtn = document.getElementById('exitAdminBtn');

            let isAdmin = false;
            let clickCount = 0;
            let clickTimer = null;

            function setStatus(text, type = 'info') {
                statusEl.textContent = text;
                statusEl.className = 'show ' + type;
            }

            function showUploadSuccess(fileName, fileSize, downloadURL, shortLink) {
                const sizeMB = (fileSize / 1024 / 1024).toFixed(1);
                successFileName.textContent = fileName;
                successFileMeta.textContent = `${sizeMB} MB · 剛剛上傳`;

                successDownloadBtn.onclick = function() {
                    downloadFile(downloadURL);
                };
                successCopyBtn.onclick = function() {
                    copyLink(shortLink);
                };
                uploadSuccess.classList.add('show');
            }

            successCloseBtn.addEventListener('click', function() {
                uploadSuccess.classList.remove('show');
            });

            async function uploadFile(file) {
                if (!file) return;
                setStatus('⏳ 上傳中...', 'info');
                uploadArea.style.opacity = '0.6';

                try {
                    const ext = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
                    const filePath = `public/${fileName}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from(BUCKET)
                        .upload(filePath, file, { cacheControl: '3600', upsert: false });

                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabaseClient.storage
                        .from(BUCKET)
                        .getPublicUrl(filePath);

                    const downloadURL = urlData.publicUrl;
                    const shortCode = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
                    const shortLink = window.location.origin + window.location.pathname + '?download=' + shortCode;

                    const { error: dbError } = await supabaseClient
                        .from('files')
                        .insert({
                            file_name: file.name,
                            file_size: file.size,
                            file_type: file.type || 'unknown',
                            download_url: downloadURL,
                            short_code: shortCode,
                            uploader: 'public',
                            uploader_email: '公開上傳'
                        });

                    if (dbError) throw dbError;

                    setStatus('✅ 上傳成功！', 'success');
                    showUploadSuccess(file.name, file.size, downloadURL, shortLink);
                    loadFiles();

                } catch (err) {
                    setStatus('❌ 上傳失敗: ' + err.message, 'error');
                } finally {
                    uploadArea.style.opacity = '1';
                }
            }

            async function loadFiles() {
                try {
                    const { data, error } = await supabaseClient
                        .from('files')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    fileCount.textContent = `📁 共 ${data?.length || 0} 個檔案`;

                    if (!data || data.length === 0) {
                        fileList.innerHTML = `<div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>`;
                        return;
                    }

                    let html = '';
                    data.forEach(f => {
                        const sizeMB = (f.file_size / 1024 / 1024).toFixed(1);
                        const shortLink = window.location.origin + window.location.pathname + '?download=' + f
                        .short_code;
                        const time = f.created_at ? new Date(f.created_at).toLocaleDateString() : '';

                        html += `
                            <div class="file-item" data-id="${f.id}">
                                <div class="file-info">
                                    <div class="file-name">📄 ${f.file_name}</div>
                                    <div class="file-meta">${sizeMB} MB · ${f.download_count || 0} 次下載 · ${time}</div>
                                    <div class="short-link">🔗 ${shortLink}</div>
                                </div>
                                <div class="file-actions">
                                    <button class="copy-btn" data-link="${shortLink}">📋 複製</button>
                                    <button class="download-btn" data-url="${f.download_url}">⬇️ 下載</button>
                                    ${isAdmin ? `<button class="delete-btn" data-id="${f.id}" data-url="${f.download_url}">🗑️ 刪除</button>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    fileList.innerHTML = html;

                    document.querySelectorAll('.copy-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            copyLink(this.getAttribute('data-link'));
                        });
                    });

                    document.querySelectorAll('.download-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            downloadFile(this.getAttribute('data-url'));
                        });
                    });

                    if (isAdmin) {
                        document.querySelectorAll('.delete-btn').forEach(btn => {
                            btn.addEventListener('click', function() {
                                const id = this.getAttribute('data-id');
                                const url = this.getAttribute('data-url');
                                deleteFile(id, url);
                            });
                        });
                    }

                } catch (err) {
                    fileList.innerHTML = `<p style="color:red;">載入失敗: ${err.message}</p>`;
                }
            }

            async function deleteFile(id, downloadURL) {
                if (!confirm('確定要刪除這個檔案嗎？此動作無法復原！')) return;

                try {
                    const urlParts = downloadURL.split('/');
                    const filePath = urlParts.slice(urlParts.indexOf('files') + 1).join('/');
                    await supabaseClient.storage.from(BUCKET).remove([filePath]);
                    await supabaseClient.from('files').delete().eq('id', id);
                    setStatus('🗑️ 檔案已刪除', 'success');
                    loadFiles();
                } catch (err) {
                    alert('刪除失敗: ' + err.message);
                }
            }

            // 上傳事件
            uploadArea.addEventListener('click', function() { fileInput.click(); });
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#1e5ef7';
                this.style.background = '#f0f4ff';
            });
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = '#d0d8e6';
                this.style.background = 'transparent';
            });
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '#d0d8e6';
                this.style.background = 'transparent';
                if (e.dataTransfer.files.length > 0) {
                    uploadFile(e.dataTransfer.files[0]);
                }
            });
            fileInput.addEventListener('change', function() {
                if (this.files.length > 0) {
                    uploadFile(this.files[0]);
                }
                this.value = '';
            });

            // 管理員
            adminSecretBtn.addEventListener('click', function() {
                clickCount++;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { clickCount = 0; }, 2000);

                if (clickCount >= 3) {
                    clickCount = 0;
                    const modal = document.getElementById('adminModal');
                    if (modal) modal.classList.add('show');
                    const err = document.getElementById('adminError');
                    if (err) err.classList.remove('show');
                    document.getElementById('adminUser').value = 'admin';
                    document.getElementById('adminPass').value = '7891';
                    document.getElementById('adminPass').focus();
                }
            });

            // 管理員登入模態框（因為是動態創建的，需要添加到 body）
            const modalHTML = `
                <div class="modal-overlay" id="adminModal">
                    <div class="modal-box">
                        <h2>🔐 管理員登入</h2>
                        <input type="text" id="adminUser" placeholder="帳號" value="admin">
                        <input type="password" id="adminPass" placeholder="密碼" value="7891">
                        <button id="adminLoginBtn">登入</button>
                        <p class="error-msg" id="adminError">帳號或密碼錯誤</p>
                        <button id="adminCancelBtn" style="background:#ccc;color:#333;margin-top:8px;">取消</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            document.getElementById('adminLoginBtn').addEventListener('click', function() {
                const user = document.getElementById('adminUser').value.trim();
                const pass = document.getElementById('adminPass').value.trim();
                if (user === 'admin' && pass === '7891') {
                    document.getElementById('adminModal').classList.remove('show');
                    isAdmin = true;
                    adminBadge.classList.add('show');
                    exitAdminBtn.style.display = 'inline-block';
                    setStatus('👑 管理員模式已啟用', 'success');
                    loadFiles();
                } else {
                    document.getElementById('adminError').classList.add('show');
                }
            });

            document.getElementById('adminCancelBtn').addEventListener('click', function() {
                document.getElementById('adminModal').classList.remove('show');
                clickCount = 0;
            });

            document.getElementById('adminModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                    clickCount = 0;
                }
            });

            exitAdminBtn.addEventListener('click', function() {
                isAdmin = false;
                adminBadge.classList.remove('show');
                exitAdminBtn.style.display = 'none';
                setStatus('已退出管理員模式', 'info');
                loadFiles();
            });

            // 初始載入
            loadFiles();
            setStatus('✅ 就緒', 'success');
        }

        // ============================================================
        // 5. 🚀 啟動邏輯（最先執行）
        // ============================================================
        (function init() {
            const params = new URLSearchParams(window.location.search);
            const shortCode = params.get('download');

            if (shortCode) {
                // 有短碼 → 顯示下載頁面
                showDownloadPage(shortCode);
            } else {
                // 無短碼 → 顯示主頁面
                loadMainPage();
            }
        })();
    </script>
</body>
</html>
