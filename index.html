<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>🍎 苹果网盘</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
                   白色风格 · 无敌雷霆精美 UI
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 20px;
            color: #1a1a2e;
        }

        .app {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 32px 36px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
            position: relative;
        }

        /* ----- 顶部 ----- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0b0b1a;
        }
        .logo i {
            font-size: 28px;
            color: #1e5ef7;
            background: linear-gradient(145deg, #1e5ef7, #3b7cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            background: linear-gradient(145deg, #0b0b1a, #2d3342);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-badge {
            display: none;
            background: #1e5ef7;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .admin-badge.show {
            display: inline-block;
        }

        .exit-admin-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: #4a5a6e;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .exit-admin-btn:hover {
            background: #f1f4f9;
            border-color: #cbd5e1;
        }
        .exit-admin-btn.show {
            display: inline-block;
        }

        /* 隐藏管理按钮（右上角小圆点） */
        #adminSecretBtn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid #eef2f6;
            color: #c8d0dc;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.5;
        }
        #adminSecretBtn:hover {
            opacity: 1;
            border-color: #b8c4d4;
        }

        .subtitle {
            color: #8a98aa;
            font-size: 14px;
            margin-bottom: 24px;
            font-weight: 450;
            letter-spacing: 0.2px;
        }

        /* ----- 状态信息 ----- */
        #status {
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 450;
            background: #f8faff;
            color: #1e5ef7;
            border: 1px solid #e8effb;
        }
        #status.show {
            display: block;
        }
        #status.success {
            background: #ecfdf3;
            color: #0f7b3a;
            border-color: #b8e0c4;
        }
        #status.error {
            background: #fef3f2;
            color: #b91c1c;
            border-color: #fcd3d0;
        }
        #status.info {
            background: #f0f7ff;
            color: #1a5bbf;
            border-color: #c5d9f5;
        }

        /* ----- 上传区（精美卡片） ----- */
        .upload-card {
            background: #fafcff;
            border: 2px dashed #dce3ec;
            border-radius: 28px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 28px;
            position: relative;
        }
        .upload-card:hover {
            border-color: #1e5ef7;
            background: #f5f9ff;
            transform: translateY(-2px);
        }
        .upload-card:active {
            transform: scale(0.98);
        }
        .upload-card .icon {
            font-size: 48px;
            color: #1e5ef7;
            opacity: 0.8;
            margin-bottom: 8px;
            display: block;
        }
        .upload-card p {
            color: #3d4a5e;
            font-weight: 500;
            font-size: 16px;
        }
        .upload-card .hint {
            font-size: 13px;
            color: #9aabbe;
            font-weight: 400;
            margin-top: 4px;
        }
        #fileInput {
            display: none;
        }

        /* ----- 上传成功卡片 ----- */
        .upload-success {
            background: #ecfdf3;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #b8e0c4;
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 16px;
        }
        .upload-success.show {
            display: flex;
        }
        .upload-success .file-info {
            flex: 1;
            min-width: 140px;
        }
        .upload-success .file-name {
            font-weight: 600;
            font-size: 15px;
            color: #0b2b1a;
        }
        .upload-success .file-meta {
            font-size: 13px;
            color: #3e7352;
        }
        .upload-success .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .upload-success .actions button {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-download-sm {
            background: #1e5ef7;
            color: white;
        }
        .btn-download-sm:hover {
            background: #2b6af7;
        }
        .btn-copy-sm {
            background: #e8effb;
            color: #1e5ef7;
        }
        .btn-copy-sm:hover {
            background: #d4e2fa;
        }
        .btn-close-sm {
            background: transparent;
            color: #6a7a8e;
            border: 1px solid #dce3ec;
        }
        .btn-close-sm:hover {
            background: #f1f4f9;
        }

        /* ----- 文件列表 ----- */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .file-count {
            font-size: 14px;
            font-weight: 500;
            color: #5a6a7e;
        }
        .file-count span {
            background: #eef2f6;
            padding: 0 10px;
            border-radius: 30px;
            font-size: 12px;
            color: #3d4a5e;
            margin-left: 6px;
        }

        #fileList {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #fafcff;
            border-radius: 18px;
            transition: 0.2s;
            border: 1px solid transparent;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .file-item:hover {
            background: #f5f8fe;
            border-color: #e8effb;
        }
        .file-item .info {
            flex: 1;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .file-item .info .icon {
            font-size: 22px;
            opacity: 0.7;
            width: 36px;
            text-align: center;
        }
        .file-item .info .name {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
            word-break: break-word;
        }
        .file-item .info .meta {
            font-size: 12px;
            color: #8a98aa;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            margin-top: 2px;
        }
        .file-item .info .short-link {
            font-size: 12px;
            color: #1e5ef7;
            background: #eef4fe;
            padding: 0 12px;
            border-radius: 30px;
            display: inline-block;
            word-break: break-all;
        }
        .file-item .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .file-item .actions button {
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: #eef2f6;
            color: #3d4a5e;
        }
        .file-item .actions button:hover {
            background: #e2e8f0;
        }
        .file-item .actions .download-btn {
            background: #1e5ef7;
            color: white;
        }
        .file-item .actions .download-btn:hover {
            background: #2b6af7;
        }
        .file-item .actions .delete-btn {
            background: #fee9e7;
            color: #b91c1c;
        }
        .file-item .actions .delete-btn:hover {
            background: #fcd3d0;
        }

        .empty-state {
            color: #9aabbe;
            text-align: center;
            padding: 40px 0;
            font-size: 15px;
        }

        /* ----- 下載頁面（分享鏈接） ----- */
        .download-page {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .download-page .big-icon {
            font-size: 72px;
            margin-bottom: 8px;
        }
        .download-page h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .download-page .meta {
            color: #8a98aa;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .download-page .btn-download-big {
            background: #1e5ef7;
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(30, 94, 247, 0.25);
            transition: 0.2s;
        }
        .download-page .btn-download-big:hover {
            background: #2b6af7;
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(30, 94, 247, 0.3);
        }
        .download-page .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #8a98aa;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }
        .download-page .back-link:hover {
            color: #1e5ef7;
            border-bottom-color: #1e5ef7;
        }

        /* ----- 診斷框（低調） ----- */
        .debug-box {
            background: #f4f6fa;
            border-radius: 14px;
            padding: 12px 16px;
            margin-top: 18px;
            font-family: 'Inter', monospace;
            font-size: 12px;
            color: #5a6a7e;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            border: 1px solid #e8edf4;
        }
        .debug-box.show {
            display: block;
        }
        .debug-box.error {
            border-color: #fcd3d0;
            background: #fef3f2;
            color: #b91c1c;
        }
        .debug-box.success {
            border-color: #b8e0c4;
            background: #ecfdf3;
            color: #0f7b3a;
        }
        .debug-box.info {
            border-color: #c5d9f5;
            background: #f0f7ff;
            color: #1a5bbf;
        }

        /* ----- 管理員登入模態框（純白） ----- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #ffffff;
            border-radius: 40px;
            padding: 36px 32px 32px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .modal-box h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1a1a2e;
        }
        .modal-box .modal-sub {
            color: #8a98aa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            background: #fafcff;
            transition: 0.2s;
            outline: none;
        }
        .modal-box input:focus {
            border-color: #1e5ef7;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(30, 94, 247, 0.08);
        }
        .modal-box button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #1e5ef7;
            color: white;
        }
        .modal-box button:hover {
            background: #2b6af7;
        }
        .modal-box .error-msg {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .modal-box .error-msg.show {
            display: block;
        }
        .modal-box .cancel-btn {
            background: transparent;
            color: #8a98aa;
            margin-top: 8px;
            font-weight: 450;
        }
        .modal-box .cancel-btn:hover {
            background: #f1f4f9;
        }

        /* ----- 響應式 ----- */
        @media (max-width: 600px) {
            .app {
                padding: 20px 16px 28px;
                border-radius: 28px;
            }
            .logo {
                font-size: 20px;
            }
            .upload-card {
                padding: 32px 16px;
            }
            .upload-card .icon {
                font-size: 36px;
            }
            .file-item {
                padding: 12px 14px;
            }
            .file-item .info {
                flex-wrap: wrap;
                gap: 6px;
            }
            .modal-box {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">

        <!-- ========== 頂欄 ========== -->
        <div class="topbar">
            <div class="logo">
                <i class="logo-icon">🍎</i>
                <span>蘋果網盤</span>
            </div>
            <div class="topbar-actions">
                <span class="admin-badge" id="adminBadge">👑 管理員</span>
                <button class="exit-admin-btn" id="exitAdminBtn" onclick="exitAdmin()">退出管理</button>
                <button id="adminSecretBtn" onclick="adminSecretClick()" aria-label="管理入口">⋅⋅⋅</button>
            </div>
        </div>
        <div class="subtitle">📤 完全公開 · 無需登入 · 即傳即用</div>

        <!-- ========== 狀態 ========== -->
        <div id="status"></div>

        <!-- ========== 主界面 ========== -->
        <div id="mainUI">

            <!-- 上傳區 -->
            <div class="upload-card" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <span class="icon">📤</span>
                <p>點擊或拖曳上傳檔案</p>
                <div class="hint">所有檔案類型 · 無大小限制</div>
            </div>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)" />

            <!-- 上傳成功卡片 -->
            <div class="upload-success" id="uploadSuccess">
                <div class="file-info">
                    <div class="file-name" id="successFileName">檔案名稱</div>
                    <div class="file-meta" id="successFileMeta">大小 · 剛剛上傳</div>
                </div>
                <div class="actions">
                    <button class="btn-download-sm" onclick="downloadSuccessFile()">⬇️ 下載</button>
                    <button class="btn-copy-sm" onclick="copySuccessLink()">📋 複製連結</button>
                    <button class="btn-close-sm" onclick="document.getElementById('uploadSuccess').classList.remove('show')">✕</button>
                </div>
            </div>

            <!-- 檔案列表 -->
            <div class="list-header">
                <div class="file-count" id="fileCount">📁 共 <span id="fileCountNum">0</span> 個檔案</div>
            </div>
            <div id="fileList">
                <div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>
            </div>
        </div>

        <!-- ========== 下載頁面 ========== -->
        <div id="downloadUI" style="display:none;">
            <div class="download-page">
                <div class="big-icon" id="downloadIcon">📄</div>
                <h2 id="downloadFileName">檔案名稱</h2>
                <div class="meta" id="downloadFileMeta">大小 · 公開分享</div>
                <button class="btn-download-big" id="directDownloadBtn" onclick="directDownload()">⬇️ 立即下載</button>
                <div style="margin-top:8px; font-size:13px; color:#9aabbe;">⚡ 全速下載 · 無需登入</div>
                <div id="debugBox" class="debug-box"></div>
                <a href="#" class="back-link" id="backHomeLink">← 返回首頁</a>
            </div>
        </div>
    </div>

    <!-- ========== 管理員登入模態框 ========== -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h2>🔐 管理員登入</h2>
            <div class="modal-sub">請輸入管理員憑證</div>
            <input type="text" id="adminUser" placeholder="帳號" />
            <input type="password" id="adminPass" placeholder="密碼" />
            <button onclick="adminLogin()">登入</button>
            <div class="error-msg" id="adminError">帳號或密碼錯誤</div>
            <button class="cancel-btn" onclick="document.getElementById('adminModal').classList.remove('show')">取消</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <script>
        // ============================================================
        // 1. Supabase 設定
        // ============================================================
        const SUPABASE_URL = 'https://mpygxmnugiknpqlkzczm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_JHvmzxxmPDCyP7PH9eYtzQ_GWOBVHPS';
        const BUCKET = 'files';

        if (typeof supabase === 'undefined') {
            alert('❌ Supabase SDK 載入失敗，請檢查網路！');
            throw new Error('SDK 未載入');
        }
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 2. 狀態
        // ============================================================
        let isAdmin = false;
        let adminClickCount = 0;
        let adminClickTimer = null;
        let lastUploaded = { fileName: '', fileSize: 0, downloadURL: '', shortLink: '' };

        // ============================================================
        // 3. 用戶 ID（localStorage 區分）
        // ============================================================
        function getUserId() {
            let id = localStorage.getItem('applepan_user_id');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                localStorage.setItem('applepan_user_id', id);
            }
            return id;
        }
        const CURRENT_USER_ID = getUserId();

        // ============================================================
        // 4. 核心下載（不跳轉）
        // ============================================================
        async function downloadFileDirect(url, fileName) {
            if (!fileName) fileName = url.split('/').pop() || '下載檔案';
            const btn = document.activeElement;
            try {
                if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const blob = await resp.blob();
                const objUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = objUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(objUrl), 5000);
                if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '⬇️ 下載';
                        btn.disabled = false; }, 1500); }
            } catch (e) {
                alert('下載失敗: ' + e.message);
                if (btn) { btn.textContent = '⬇️ 下載';
                    btn.disabled = false; }
            }
        }

        // ============================================================
        // 5. 工具
        // ============================================================
        function showStatus(text, type = 'info') {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'show ' + type;
        }

        function copyLink(link) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => alert('✅ 連結已複製！\n' + link))
                    .catch(() => prompt('請手動複製：', link));
            } else {
                prompt('請手動複製：', link);
            }
        }

        // ============================================================
        // 6. 上傳
        // ============================================================
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            showStatus('⏳ 上傳中...', 'info');
            document.getElementById('uploadArea').style.opacity = '0.6';

            try {
                const ext = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
                const filePath = `public/${fileName}`;

                const { error: ue } = await supabaseClient.storage.from(BUCKET).upload(filePath, file, { cacheControl: '3600',
                        upsert: false });
                if (ue) throw ue;

                const { data: urlData } = supabaseClient.storage.from(BUCKET).getPublicUrl(filePath);
                const downloadURL = urlData.publicUrl;
                const shortCode = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
                const shortLink = window.location.origin + window.location.pathname + '?download=' + shortCode;

                const { error: de } = await supabaseClient.from('files').insert({
                    file_name: file.name,
                    file_size: file.size,
                    file_type: file.type || 'unknown',
                    download_url: downloadURL,
                    short_code: shortCode,
                    uploader: CURRENT_USER_ID,
                    uploader_email: '公開上傳'
                });
                if (de) throw de;

                lastUploaded = { fileName: file.name, fileSize: file.size, downloadURL, shortLink };
                const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                document.getElementById('successFileName').textContent = file.name;
                document.getElementById('successFileMeta').textContent = `${sizeMB} MB · 剛剛上傳`;
                document.getElementById('uploadSuccess').classList.add('show');
                showStatus('✅ 上傳成功！', 'success');
                loadFileList();
            } catch (err) {
                showStatus('❌ 上傳失敗: ' + err.message, 'error');
                alert('上傳失敗: ' + err.message);
            } finally {
                document.getElementById('uploadArea').style.opacity = '1';
                document.getElementById('fileInput').value = '';
            }
        }

        function downloadSuccessFile() {
            if (lastUploaded.downloadURL) downloadFileDirect(lastUploaded.downloadURL, lastUploaded.fileName);
            else alert('沒有可下載的檔案');
        }

        function copySuccessLink() {
            if (lastUploaded.shortLink) copyLink(lastUploaded.shortLink);
            else alert('沒有可複製的連結');
        }

        // ============================================================
        // 7. 載入檔案列表（普通用戶只看自己，管理員全看）
        // ============================================================
        async function loadFileList() {
            try {
                let query = supabaseClient.from('files').select('*');
                if (!isAdmin) query = query.eq('uploader', CURRENT_USER_ID);
                const { data, error } = await query.order('created_at', { ascending: false });
                if (error) throw error;

                const count = data?.length || 0;
                document.getElementById('fileCountNum').textContent = count;

                const container = document.getElementById('fileList');
                if (!data || count === 0) {
                    container.innerHTML = `<div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>`;
                    return;
                }

                let html = '';
                data.forEach(f => {
                    const sizeMB = (f.file_size / 1024 / 1024).toFixed(1);
                    const shortLink = window.location.origin + window.location.pathname + '?download=' + f.short_code;
                    const time = f.created_at ? new Date(f.created_at).toLocaleDateString() : '';
                    const uploaderInfo = isAdmin ? ` · 上傳者: ${f.uploader_email || f.uploader || '匿名'}` : '';

                    html += `
                        <div class="file-item">
                            <div class="info">
                                <div class="icon">📄</div>
                                <div>
                                    <div class="name">${f.file_name}</div>
                                    <div class="meta">${sizeMB} MB · ${f.download_count || 0} 次下載 · ${time}${uploaderInfo}</div>
                                    <div class="short-link">🔗 ${shortLink}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button onclick="copyLink('${shortLink}')">複製</button>
                                <button class="download-btn" onclick="downloadFileDirect('${f.download_url}', '${f.file_name}')">⬇️ 下載</button>
                                ${isAdmin ? `<button class="delete-btn" onclick="deleteFile('${f.id}', '${f.download_url}')">🗑️ 刪除</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('fileList').innerHTML = `<div class="empty-state" style="color:#b91c1c;">❌ 載入失敗: ${err.message}</div>`;
            }
        }

        async function deleteFile(id, downloadURL) {
            if (!confirm('確定要刪除這個檔案嗎？此動作無法復原！')) return;
            try {
                const urlParts = downloadURL.split('/');
                const filePath = urlParts.slice(urlParts.indexOf('files') + 1).join('/');
                await supabaseClient.storage.from(BUCKET).remove([filePath]);
                await supabaseClient.from('files').delete().eq('id', id);
                showStatus('🗑️ 檔案已刪除', 'success');
                loadFileList();
            } catch (err) {
                alert('刪除失敗: ' + err.message);
            }
        }

        // ============================================================
        // 8. 管理員
        // ============================================================
        function adminLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if (user === 'admin' && pass === '7891') {
                document.getElementById('adminModal').classList.remove('show');
                isAdmin = true;
                document.getElementById('adminBadge').classList.add('show');
                document.getElementById('exitAdminBtn').classList.add('show');
                showStatus('👑 管理員模式已啟用', 'success');
                loadFileList();
            } else {
                document.getElementById('adminError').classList.add('show');
            }
        }

        function exitAdmin() {
            isAdmin = false;
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('exitAdminBtn').classList.remove('show');
            showStatus('已退出管理員模式', 'info');
            loadFileList();
        }

        function adminSecretClick() {
            adminClickCount++;
            clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000);
            if (adminClickCount >= 3) {
                adminClickCount = 0;
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminError').classList.remove('show');
                document.getElementById('adminUser').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPass').focus();
            }
        }

        // ============================================================
        // 9. 分享連結處理
        // ============================================================
        async function handleShareLink() {
            const params = new URLSearchParams(window.location.search);
            const shortCode = params.get('download');
            const debugBox = document.getElementById('debugBox');

            // ?admin 入口
            if (params.has('admin')) {
                document.getElementById('mainUI').style.display = 'none';
                document.getElementById('downloadUI').style.display = 'none';
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminUser').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminError').classList.remove('show');
                return;
            }

            if (!shortCode) {
                document.getElementById('mainUI').style.display = 'block';
                document.getElementById('downloadUI').style.display = 'none';
                return;
            }

            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('downloadUI').style.display = 'block';

            debugBox.className = 'debug-box show info';
            debugBox.textContent = `🔍 查詢短碼: ${shortCode} ...`;

            try {
                const { data, error } = await supabaseClient.from('files').select('*').eq('short_code', shortCode)
                    .maybeSingle();
                if (error || !data) {
                    debugBox.className = 'debug-box show error';
                    debugBox.textContent = `❌ 找不到短碼: ${shortCode}\n可能原因：檔案已被刪除或短碼錯誤。`;
                    document.getElementById('downloadFileName').textContent = '❌ 檔案不存在';
                    document.getElementById('downloadFileMeta').textContent = '連結可能已過期';
                    document.getElementById('directDownloadBtn').style.display = 'none';
                    document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
                    return;
                }

                debugBox.className = 'debug-box show success';
                debugBox.textContent = `✅ 找到檔案: ${data.file_name}`;

                supabaseClient.from('files').update({ download_count: (data.download_count || 0) + 1 }).eq('id', data.id)
                    .then();

                const sizeMB = (data.file_size / 1024 / 1024).toFixed(1);
                document.getElementById('downloadFileName').textContent = data.file_name;
                document.getElementById('downloadFileMeta').textContent =
                    `${sizeMB} MB · 公開分享 · 下載 ${data.download_count || 0} 次`;
                document.getElementById('directDownloadBtn').style.display = 'inline-block';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;

                window._downloadURL = data.download_url;
                window._downloadFileName = data.file_name;

            } catch (err) {
                debugBox.className = 'debug-box show error';
                debugBox.textContent = `❌ 載入失敗: ${err.message}`;
                document.getElementById('downloadFileName').textContent = '❌ 載入失敗';
                document.getElementById('downloadFileMeta').textContent = err.message;
                document.getElementById('directDownloadBtn').style.display = 'none';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
            }
        }

        function directDownload() {
            if (window._downloadURL && window._downloadFileName) {
                downloadFileDirect(window._downloadURL, window._downloadFileName);
            } else {
                alert('無法下載，請重新整理頁面');
            }
        }

        // ============================================================
        // 10. 拖曳
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const area = document.getElementById('uploadArea');
            area.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#1e5ef7';
                this.style.background = '#f5f9ff';
            });
            area.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = '#dce3ec';
                this.style.background = '#fafcff';
            });
            area.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '#dce3ec';
                this.style.background = '#fafcff';
                if (e.dataTransfer.files.length > 0) {
                    document.getElementById('fileInput').files = e.dataTransfer.files;
                    handleFileSelect({ target: document.getElementById('fileInput') });
                }
            });
        });

        // ============================================================
        // 11. 啟動
        // ============================================================
        window.onload = function() {
            handleShareLink();
            const params = new URLSearchParams(window.location.search);
            if (!params.get('download') && !params.has('admin')) {
                document.getElementById('mainUI').style.display = 'block';
                document.getElementById('downloadUI').style.display = 'none';
                loadFileList();
                showStatus('✅ 就緒', 'success');
                console.log('👤 用戶 ID:', CURRENT_USER_ID);
            }
        };

        console.log('🍎 蘋果網盤 · 白色精美版');
        console.log('🔑 管理員入口: ?admin');
        console.log('👤 當前用戶:', CURRENT_USER_ID);
    </script>
</body>
</html>
