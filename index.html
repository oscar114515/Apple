<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>🍎 苹果网盘</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        /* ===== 白色精美 UI ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 20px;
            color: #1a1a2e;
        }
        .app {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 32px 36px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.02);
            position: relative;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #0b0b1a;
        }
        .logo i {
            font-size: 28px;
            color: #1e5ef7;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-badge {
            display: none;
            background: #1e5ef7;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .admin-badge.show {
            display: inline-block;
        }
        .exit-admin-btn,
        .logout-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: #4a5a6e;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .exit-admin-btn.show,
        .logout-btn.show {
            display: inline-block;
        }
        .exit-admin-btn:hover,
        .logout-btn:hover {
            background: #f1f4f9;
        }
        #adminSecretBtn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid #eef2f6;
            color: #c8d0dc;
            font-size: 13px;
            cursor: pointer;
            opacity: 0.5;
        }
        #adminSecretBtn:hover {
            opacity: 1;
        }
        .subtitle {
            color: #8a98aa;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* 认证表单 */
        .auth-container {
            max-width: 480px;
            margin: 0 auto 24px;
        }
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: #f4f6fa;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 30px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            color: #6a7a8e;
            border: none;
            background: transparent;
        }
        .auth-tab.active {
            background: white;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .auth-form.active {
            display: flex;
        }
        .auth-form input,
        .auth-form .country-selector {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            background: #fafcff;
            transition: 0.2s;
            outline: none;
        }
        .auth-form input:focus {
            border-color: #1e5ef7;
            box-shadow: 0 0 0 3px rgba(30, 94, 247, 0.08);
        }
        .auth-form button {
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            background: #1e5ef7;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-form button:hover {
            background: #2b6af7;
        }
        .auth-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .auth-form .toggle-link {
            text-align: center;
            font-size: 14px;
            color: #1e5ef7;
            cursor: pointer;
            margin-top: 4px;
        }
        .auth-form .toggle-link:hover {
            text-decoration: underline;
        }
        .auth-form .error-msg {
            color: #b91c1c;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .auth-form .error-msg.show {
            display: block;
        }
        .auth-form .success-msg {
            color: #0f7b3a;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .auth-form .success-msg.show {
            display: block;
        }

        /* ===== 国家选择器 ===== */
        .country-selector {
            position: relative;
        }
        .country-selector .selected {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            background: #fafcff;
            transition: 0.2s;
        }
        .country-selector .selected:hover {
            border-color: #1e5ef7;
        }
        .country-selector .selected .flag {
            font-size: 22px;
        }
        .country-selector .selected .code {
            color: #8a98aa;
            font-size: 13px;
        }
        .country-selector .selected .arrow {
            margin-left: auto;
            color: #8a98aa;
            transition: 0.2s;
        }
        .country-selector .selected .arrow.open {
            transform: rotate(180deg);
        }
        .country-selector .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            margin-top: 6px;
            max-height: 300px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }
        .country-selector .dropdown.open {
            display: block;
        }
        .country-selector .dropdown .search {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f2f6;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }
        .country-selector .dropdown .search input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            background: #fafcff;
        }
        .country-selector .dropdown .search input:focus {
            border-color: #1e5ef7;
        }
        .country-selector .dropdown .list {
            overflow-y: auto;
            max-height: 220px;
            padding: 4px 0;
        }
        .country-selector .dropdown .list .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: 0.15s;
        }
        .country-selector .dropdown .list .item:hover {
            background: #f0f7ff;
        }
        .country-selector .dropdown .list .item .flag {
            font-size: 20px;
            min-width: 28px;
        }
        .country-selector .dropdown .list .item .name {
            flex: 1;
            font-size: 14px;
        }
        .country-selector .dropdown .list .item .code {
            color: #8a98aa;
            font-size: 13px;
        }
        .country-selector .dropdown .list .no-result {
            padding: 20px;
            text-align: center;
            color: #8a98aa;
            font-size: 14px;
        }
        .country-selector .dropdown .list .group-label {
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #8a98aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #f8fafc;
            border-bottom: 1px solid #f0f2f6;
        }

        /* ===== 其他样式 ===== */
        #status {
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        #status.show {
            display: block;
        }
        #status.success {
            background: #ecfdf3;
            color: #0f7b3a;
            border: 1px solid #b8e0c4;
        }
        #status.error {
            background: #fef3f2;
            color: #b91c1c;
            border: 1px solid #fcd3d0;
        }
        #status.info {
            background: #f0f7ff;
            color: #1a5bbf;
            border: 1px solid #c5d9f5;
        }

        .upload-card {
            background: #fafcff;
            border: 2px dashed #dce3ec;
            border-radius: 28px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            margin-bottom: 24px;
        }
        .upload-card:hover {
            border-color: #1e5ef7;
            background: #f5f9ff;
            transform: translateY(-2px);
        }
        .upload-card .icon {
            font-size: 48px;
            color: #1e5ef7;
            display: block;
            margin-bottom: 8px;
        }
        .upload-card p {
            font-weight: 500;
            color: #3d4a5e;
        }
        .upload-card .hint {
            font-size: 13px;
            color: #9aabbe;
        }
        #fileInput {
            display: none;
        }

        .upload-success {
            background: #ecfdf3;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #b8e0c4;
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 16px;
        }
        .upload-success.show {
            display: flex;
        }
        .upload-success .file-info {
            flex: 1;
        }
        .upload-success .file-name {
            font-weight: 600;
            font-size: 15px;
            color: #0b2b1a;
        }
        .upload-success .file-meta {
            font-size: 13px;
            color: #3e7352;
        }
        .upload-success .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .upload-success .actions button {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-download-sm {
            background: #1e5ef7;
            color: white;
        }
        .btn-download-sm:hover {
            background: #2b6af7;
        }
        .btn-copy-sm {
            background: #e8effb;
            color: #1e5ef7;
        }
        .btn-copy-sm:hover {
            background: #d4e2fa;
        }
        .btn-close-sm {
            background: transparent;
            color: #6a7a8e;
            border: 1px solid #dce3ec;
        }
        .btn-close-sm:hover {
            background: #f1f4f9;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .file-count {
            font-size: 14px;
            font-weight: 500;
            color: #5a6a7e;
        }
        .file-count span {
            background: #eef2f6;
            padding: 0 10px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 6px;
        }

        #fileList {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #fafcff;
            border-radius: 18px;
            transition: 0.2s;
            border: 1px solid transparent;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .file-item:hover {
            background: #f5f8fe;
            border-color: #e8effb;
        }
        .file-item .info {
            flex: 1;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .file-item .info .icon {
            font-size: 22px;
            width: 36px;
            text-align: center;
            opacity: 0.7;
        }
        .file-item .info .name {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
        }
        .file-item .info .meta {
            font-size: 12px;
            color: #8a98aa;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
        }
        .file-item .info .short-link {
            font-size: 12px;
            color: #1e5ef7;
            background: #eef4fe;
            padding: 0 12px;
            border-radius: 30px;
            display: inline-block;
            word-break: break-all;
        }
        .file-item .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .file-item .actions button {
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: #eef2f6;
            color: #3d4a5e;
        }
        .file-item .actions button:hover {
            background: #e2e8f0;
        }
        .file-item .actions .download-btn {
            background: #1e5ef7;
            color: white;
        }
        .file-item .actions .download-btn:hover {
            background: #2b6af7;
        }
        .file-item .actions .delete-btn {
            background: #fee9e7;
            color: #b91c1c;
        }
        .file-item .actions .delete-btn:hover {
            background: #fcd3d0;
        }

        .empty-state {
            color: #9aabbe;
            text-align: center;
            padding: 40px 0;
            font-size: 15px;
        }

        .download-page {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .download-page .big-icon {
            font-size: 72px;
            margin-bottom: 8px;
        }
        .download-page h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .download-page .meta {
            color: #8a98aa;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .download-page .btn-download-big {
            background: #1e5ef7;
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(30, 94, 247, 0.25);
            transition: 0.2s;
        }
        .download-page .btn-download-big:hover {
            background: #2b6af7;
            transform: translateY(-2px);
        }
        .download-page .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #8a98aa;
            text-decoration: none;
            font-size: 14px;
        }
        .download-page .back-link:hover {
            color: #1e5ef7;
        }

        .debug-box {
            background: #f4f6fa;
            border-radius: 14px;
            padding: 12px 16px;
            margin-top: 18px;
            font-family: monospace;
            font-size: 12px;
            color: #5a6a7e;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            border: 1px solid #e8edf4;
        }
        .debug-box.show {
            display: block;
        }
        .debug-box.error {
            border-color: #fcd3d0;
            background: #fef3f2;
            color: #b91c1c;
        }
        .debug-box.success {
            border-color: #b8e0c4;
            background: #ecfdf3;
            color: #0f7b3a;
        }
        .debug-box.info {
            border-color: #c5d9f5;
            background: #f0f7ff;
            color: #1a5bbf;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 40px;
            padding: 36px 32px 32px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .modal-box h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .modal-box .modal-sub {
            color: #8a98aa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            background: #fafcff;
            outline: none;
            transition: 0.2s;
        }
        .modal-box input:focus {
            border-color: #1e5ef7;
            box-shadow: 0 0 0 3px rgba(30, 94, 247, 0.08);
        }
        .modal-box button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #1e5ef7;
            color: white;
        }
        .modal-box button:hover {
            background: #2b6af7;
        }
        .modal-box .error-msg {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .modal-box .error-msg.show {
            display: block;
        }
        .modal-box .cancel-btn {
            background: transparent;
            color: #8a98aa;
            margin-top: 8px;
            font-weight: 450;
        }
        .modal-box .cancel-btn:hover {
            background: #f1f4f9;
        }

        @media (max-width: 600px) {
            .app {
                padding: 20px 16px 28px;
                border-radius: 28px;
            }
            .auth-container {
                max-width: 100%;
            }
            .upload-card {
                padding: 32px 16px;
            }
            .file-item {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">

        <!-- 顶栏 -->
        <div class="topbar">
            <div class="logo"><i>🍎</i><span>蘋果網盤</span></div>
            <div class="topbar-actions">
                <span class="admin-badge" id="adminBadge">👑 管理員</span>
                <button class="exit-admin-btn" id="exitAdminBtn" onclick="exitAdmin()">退出管理</button>
                <button class="logout-btn" id="logoutBtn" onclick="logout()">登出</button>
                <button id="adminSecretBtn" onclick="adminSecretClick()">⋅⋅⋅</button>
            </div>
        </div>
        <div class="subtitle" id="userStatus">📤 請登入以使用完整功能</div>

        <!-- 状态 -->
        <div id="status"></div>

        <!-- ===== 认证区 ===== -->
        <div id="authContainer" class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="email">電子郵件</button>
                <button class="auth-tab" data-tab="phone">手機簡訊</button>
            </div>

            <!-- ===== 邮箱登录/注册 ===== -->
            <div class="auth-form active" id="emailForm">
                <input type="email" id="emailInput" placeholder="電子郵件" />
                <input type="password" id="passwordInput" placeholder="密碼 (至少6位)" />
                <button id="emailActionBtn">登入</button>
                <div class="toggle-link" id="toggleEmailMode">還沒有帳號？註冊</div>
                <div class="error-msg" id="emailError"></div>
                <div class="success-msg" id="emailSuccess"></div>
            </div>

            <!-- ===== 手机短信登录 ===== -->
            <div class="auth-form" id="phoneForm">
                <!-- 国家选择器 -->
                <div class="country-selector" id="countrySelector">
                    <div class="selected" id="selectedCountry" onclick="toggleCountryDropdown()">
                        <span class="flag" id="selectedFlag">🌍</span>
                        <span id="selectedName">選擇國家</span>
                        <span class="code" id="selectedCode">+XX</span>
                        <span class="arrow" id="dropdownArrow">▾</span>
                    </div>
                    <div class="dropdown" id="countryDropdown">
                        <div class="search">
                            <input type="text" id="countrySearch" placeholder="搜尋國家或區號..." oninput="filterCountries()" />
                        </div>
                        <div class="list" id="countryList"></div>
                    </div>
                </div>
                <!-- 手机号输入 -->
                <input type="tel" id="phoneInput" placeholder="手機號碼 (例如 912345678)" style="margin-top:4px;" />
                <!-- reCAPTCHA 容器 (可见) -->
                <div id="recaptcha-container" style="margin:4px 0;"></div>
                <button id="sendCodeBtn">發送驗證碼</button>
                <input type="text" id="codeInput" placeholder="驗證碼" style="margin-top:8px;" />
                <button id="verifyCodeBtn">驗證並登入</button>
                <div class="error-msg" id="phoneError"></div>
                <div class="success-msg" id="phoneSuccess"></div>
            </div>
        </div>

        <!-- ===== 主界面 (登录后显示) ===== -->
        <div id="mainUI" style="display:none;">
            <div class="upload-card" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <span class="icon">📤</span>
                <p>點擊或拖曳上傳檔案</p>
                <div class="hint">所有檔案類型 · 無大小限制</div>
            </div>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)" />

            <div class="upload-success" id="uploadSuccess">
                <div class="file-info">

        function renderCountryList(filter = '') {
            const list = document.getElementById('countryList');
            const search = filter.toLowerCase().trim();

            let filtered = countries;
            if (search) {
                filtered = countries.filter(c =>
                    c.name.includes(search) ||
                    c.code.includes(search) ||
                    c.flag === search ||
                    c.region.includes(search)
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div class="no-result">沒有找到匹配的國家</div>';
                return;
            }

            // 按地區分組顯示
            const groups = {};
            filtered.forEach(c => {
                if (!groups[c.region]) groups[c.region] = [];
                groups[c.region].push(c);
            });

            let html = '';
            const regions = ['亞洲', '歐洲', '非洲', '北美洲', '南美洲', '大洋洲'];
            regions.forEach(region => {
                if (groups[region] && groups[region].length > 0) {
                    html += `<div class="group-label">${region}</div>`;
                    groups[region].forEach(c => {
                        html += `
                            <div class="item" onclick="selectCountry('${c.code}', '${c.name}', '${c.flag}')">
                                <span class="flag">${c.flag}</span>
                                <span class="name">${c.name}</span>
                                <span class="code">${c.code}</span>
                            </div>
                        `;
                    });
                }
            });

            // 其他未分類地區
            Object.keys(groups).forEach(region => {
                if (!regions.includes(region) && groups[region].length > 0) {
                    html += `<div class="group-label">${region}</div>`;
                    groups[region].forEach(c => {
                        html += `
                            <div class="item" onclick="selectCountry('${c.code}', '${c.name}', '${c.flag}')">
                                <span class="flag">${c.flag}</span>
                                <span class="name">${c.name}</span>
                                <span class="code">${c.code}</span>
                            </div>
                        `;
                    });
                }
            });

            list.innerHTML = html;
        }

        // 下載檔案
        async function downloadFileDirect(url, fileName) {
            if (!fileName) fileName = url.split('/').pop() || '下載檔案';
            const btn = document.activeElement;
            try {
                if (btn) { btn.textContent = '⏳';
                    btn.disabled = true; }
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const blob = await resp.blob();
                const objUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = objUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(objUrl), 5000);
                if (btn) { btn.textContent = '✅';
                    setTimeout(() => { btn.textContent = '⬇️ 下載';
                        btn.disabled = false; }, 1500); }
            } catch (e) {
                alert('下載失敗: ' + e.message);
                if (btn) { btn.textContent = '⬇️ 下載';
                    btn.disabled = false; }
            }
        }

        function initRecaptcha() {
            const container = document.getElementById('recaptcha-container');

            // 清空容器
            container.innerHTML = '';
            try {
                // 使用可見的 reCAPTCHA
                recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                    size: 'normal',
                    theme: 'light',
                    badge: 'bottomright',
                    callback: function() {
                        // 用戶完成驗證
                        console.log('✅ reCAPTCHA 驗證完成');
                    },
                    'expired-callback': function() {
                        // 過期時重新渲染
                        console.log('⏳ reCAPTCHA 過期，重新渲染');
                        initRecaptcha();
                    }
                });
                recaptchaVerifier.render();
            } catch (e) {
                console.warn('reCAPTCHA 初始化錯誤:', e);
                // 如果失敗，嘗試重新初始化
                setTimeout(() => {
                    try {
                        container.innerHTML = '';
                        recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                            size: 'normal',
                            theme: 'light'
                        });
                        recaptchaVerifier.render();
                    } catch (e2) {
                        console.error('reCAPTCHA 重試失敗:', e2);

                }, 500);
            }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!currentUser) {
                alert('請先登入');
                return;
            }
            showStatus('⏳ 上傳中...', 'info');
            document.getElementById('uploadArea').style.opacity = '0.6';

            try {
                const ext = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
                const filePath = `files/${currentUser.uid}/${fileName}`;

                const uploadTask = storage.ref(filePath).put(file);
                await uploadTask;
                const downloadURL = await storage.ref(filePath).getDownloadURL();

                const shortCode = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
                const shortLink = window.location.origin + window.location.pathname + '?download=' + shortCode;

                await db.collection('files').add({
                    fileName: file.name,
                    fileSize: file.size,
                    fileType: file.type || 'unknown',
                    downloadURL: downloadURL,
                    shortCode: shortCode,
                    uploaderUid: currentUser.uid,
                    uploaderEmail: currentUser.email || currentUser.phoneNumber || '手機用戶',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    downloadCount: 0
                });

                lastUploaded = { fileName: file.name, fileSize: file.size, downloadURL, shortLink };
                const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                document.getElementById('successFileName').textContent = file.name;
                document.getElementById('successFileMeta').textContent = `${sizeMB} MB · 剛剛上傳`;
                document.getElementById('uploadSuccess').classList.add('show');
                showStatus('✅ 上傳成功！', 'success');
                loadFileList();
            } catch (err) {
                showStatus('❌ 上傳失敗: ' + err.message, 'error');
                alert('上傳失敗: ' + err.message);
            } finally {
                document.getElementById('uploadArea').style.opacity = '1';
                document.getElementById('fileInput').value = '';
            }
        }

                let query = db.collection('files');
                if (!isAdmin) {
                    query = query.where('uploaderUid', '==', currentUser.uid);
                }
                const snapshot = await query.orderBy('createdAt', 'desc').get();
                const count = snapshot.size;
                document.getElementById('fileCountNum').textContent = count;

                const container = document.getElementById('fileList');
                if (count === 0) {
                    container.innerHTML = '<div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const f = doc.data();
                    const sizeMB = (f.fileSize / 1024 / 1024).toFixed(1);
                    const shortLink = window.location.origin + window.location.pathname + '?download=' + f.shortCode;
                    const time = f.createdAt ? f.createdAt.toDate().toLocaleDateString() : '';
                    const uploaderInfo = isAdmin ? ` · 上傳者: ${f.uploaderEmail || '匿名'}` : '';

                    html += `
                        <div class="file-item">
                            <div class="info">
                                <div class="icon">📄</div>
                                <div>
                                    <div class="name">${f.fileName}</div>
                                    <div class="meta">${sizeMB} MB · ${f.downloadCount || 0} 次下載 · ${time}${uploaderInfo}</div>
                                    <div class="short-link">🔗 ${shortLink}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button onclick="copyLink('${shortLink}')">複製</button>
                                <button class="download-btn" onclick="downloadFileDirect('${f.downloadURL}', '${f.fileName}')">⬇️ 下載</button>
                                ${isAdmin ? `<button class="delete-btn" onclick="deleteFile('${doc.id}')">🗑️ 刪除</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('fileList').innerHTML = '<div class="empty-state" style="color:#b91c1c;">❌ 載入失敗: ' + err
                    .message + '</div>';
            }
        }

        async function deleteFile(docId) {
            if (!confirm('確定要刪除這個檔案嗎？此動作無法復原！')) return;
            try {
                const doc = await db.collection('files').doc(docId).get();
                const data = doc.data();
                if (data && data.downloadURL) {
                    const ref = storage.refFromURL(data.downloadURL);
                    await ref.delete();
                }
                await db.collection('files').doc(docId).delete();
                showStatus('🗑️ 檔案已刪除', 'success');
                loadFileList();
            } catch (err) {
                alert('刪除失敗: ' + err.message);
            }
        }

        // ============================================================
        // 12. 分享連結處理
        // ============================================================
        async function handleShareLink() {
            const params = new URLSearchParams(window.location.search);
            const shortCode = params.get('download');
            const debugBox = document.getElementById('debugBox');

            if (params.has('admin')) {
                document.getElementById('mainUI').style.display = 'none';
                document.getElementById('downloadUI').style.display = 'none';
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminUser').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminError').classList.remove('show');
                return;
            }

            if (!shortCode) {
                if (auth.currentUser) {
                    document.getElementById('mainUI').style.display = 'block';
                    document.getElementById('downloadUI').style.display = 'none';
                    authContainer.style.display = 'none';
                } else {
                    document.getElementById('mainUI').style.display = 'none';
                    document.getElementById('downloadUI').style.display = 'none';
                    authContainer.style.display = 'block';
                }
                return;
            }

            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('downloadUI').style.display = 'block';
            authContainer.style.display = 'none';

            debugBox.className = 'debug-box show info';
            debugBox.textContent = `🔍 查詢短碼: ${shortCode} ...`;

            try {
                const snapshot = await db.collection('files').where('shortCode', '==', shortCode).get();
                if (snapshot.empty) {
                    debugBox.className = 'debug-box show error';
                    debugBox.textContent = `❌ 找不到短碼: ${shortCode}\n可能原因：檔案已被刪除或短碼錯誤。`;
                    document.getElementById('downloadFileName').textContent = '❌ 檔案不存在';
                    document.getElementById('downloadFileMeta').textContent = '連結可能已過期';
                    document.getElementById('directDownloadBtn').style.display = 'none';
                    document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
                    return;
                }
                const data = snapshot.docs[0].data();
                const docId = snapshot.docs[0].id;

                await db.collection('files').doc(docId).update({
                    downloadCount: firebase.firestore.FieldValue.increment(1)
                });

                debugBox.className = 'debug-box show success';
                debugBox.textContent = `✅ 找到檔案: ${data.fileName}`;

                const sizeMB = (data.fileSize / 1024 / 1024).toFixed(1);
                document.getElementById('downloadFileName').textContent = data.fileName;
                document.getElementById('downloadFileMeta').textContent =
                    `${sizeMB} MB · 公開分享 · 下載 ${data.downloadCount || 0} 次`;
                document.getElementById('directDownloadBtn').style.display = 'inline-block';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;

                window._downloadURL = data.downloadURL;
                window._downloadFileName = data.fileName;

            } catch (err) {
                debugBox.className = 'debug-box show error';
                debugBox.textContent = `❌ 載入失敗: ${err.message}`;
                document.getElementById('downloadFileName').textContent = '❌ 載入失敗';
                document.getElementById('downloadFileMeta').textContent = err.message;
                document.getElementById('directDownloadBtn').style.display = 'none';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
            }
        }

        function directDownload() {
            if (window._downloadURL && window._downloadFileName) {
                downloadFileDirect(window._downloadURL, window._downloadFileName);
            } else {
                alert('無法下載，請重新整理頁面');
            }
        }

        // ============================================================
        // 13. 管理員
        // ============================================================
        function adminLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if (user === 'admin' && pass === '7891') {
                document.getElementById('adminModal').classList.remove('show');
                isAdmin = true;
                document.getElementById('adminBadge').classList.add('show');
                document.getElementById('exitAdminBtn').classList.add('show');
                showStatus('👑 管理員模式已啟用', 'success');
                document.getElementById('mainUI').style.display = 'block';
                document.getElementById('downloadUI').style.display = 'none';
                authContainer.style.display = 'none';
                loadFileList();
            } else {
                document.getElementById('adminError').classList.add('show');
            }
        }

        function exitAdmin() {
            isAdmin = false;
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('exitAdminBtn').classList.remove('show');
            showStatus('已退出管理員模式', 'info');
            loadFileList();
        }

        function adminSecretClick() {
            adminClickCount++;
            clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000);
            if (adminClickCount >= 3) {
                adminClickCount = 0;
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminError').classList.remove('show');
                document.getElementById('adminUser').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPass').focus();
            }
        }

        // ============================================================
        // 14. 初始化
        // ============================================================
        function initApp() {
            // 處理分享連結
            handleShareLink();

            // 初始化 reCAPTCHA
            setTimeout(initRecaptcha, 800);

            // 拖曳支援
            const area = document.getElementById('uploadArea');
            if (area) {
                area.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#1e5ef7';
                    this.style.background = '#f5f9ff';
                });
                area.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#dce3ec';
                    this.style.background = '#fafcff';
                });
                area.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#dce3ec';
                    this.style.background = '#fafcff';
                    if (e.dataTransfer.files.length > 0) {
                        document.getElementById('fileInput').files = e.dataTransfer.files;
                        handleFileSelect({ target: document.getElementById('fileInput') });
                    }
                });
            }

            console.log('🍎 蘋果網盤 - 完整國家選擇器版');
            console.log('📱 支援 ' + countries.length + ' 個國家/地區');
            console.log('🔑 管理員入口: ?admin');
        }

        // 由於 window.onload 已使用，改為 DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
            // 國家選擇器初始化已在 window.onload 中處理
        });

        // 確保 reCAPTCHA 在手機標籤切換時重新初始化
        console.log('✅ 蘋果網盤已載入，請先完成 reCAPTCHA 驗證再發送手機驗證碼。');
    </script>
</body>
