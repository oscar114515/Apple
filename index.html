<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>📦 輕盤 · 網站遷移</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background: #f8faff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
        }

        .migration-card {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.02);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .migration-card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(30, 94, 247, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .logo-area img {
            height: 48px;
            width: auto;
            border-radius: 10px;
        }

        .logo-area .brand {
            font-size: 26px;
            font-weight: 700;
            color: #0b0b1a;
            letter-spacing: -0.5px;
        }

        .logo-area .brand i {
            color: #1e5ef7;
            margin-right: 6px;
        }

        .migration-icon {
            font-size: 56px;
            color: #1e5ef7;
            margin: 8px 0 16px;
            display: block;
            position: relative;
            z-index: 1;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .migration-card h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0b0b1a;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .migration-card h1 .highlight {
            background: linear-gradient(145deg, #1e5ef7, #4d8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .migration-card .sub {
            font-size: 15px;
            color: #5a6a7e;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            line-height: 1.6;
        }

        .migration-card .old-url {
            display: inline-block;
            background: #f0f2f5;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #6a7a8e;
            font-family: monospace;
            margin: 4px 0 8px;
            position: relative;
            z-index: 1;
        }

        .migration-card .new-url {
            display: inline-block;
            background: #eef4fe;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #1e5ef7;
            font-family: monospace;
            font-weight: 600;
            margin: 4px 0 16px;
            position: relative;
            z-index: 1;
        }

        .arrow-icon {
            display: block;
            font-size: 28px;
            color: #8a98aa;
            margin: 4px 0;
            position: relative;
            z-index: 1;
        }

        .btn-migrate {
            background: #1e5ef7;
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 20px rgba(30, 94, 247, 0.25);
            position: relative;
            z-index: 1;
            margin-top: 4px;
            text-decoration: none;
        }

        .btn-migrate:hover {
            background: #2b6af7;
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(30, 94, 247, 0.35);
        }

        .btn-migrate:active {
            transform: scale(0.97);
        }

        .btn-migrate i {
            font-size: 18px;
        }

        .auto-redirect-info {
            font-size: 13px;
            color: #8a98aa;
            margin-top: 16px;
            position: relative;
            z-index: 1;
        }

        .auto-redirect-info .countdown {
            font-weight: 600;
            color: #1e5ef7;
            font-size: 16px;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 13px;
            color: #8a98aa;
            text-align: center;
            opacity: 0.7;
        }

        .footer-note a {
            color: #1e5ef7;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* ===== 响應式 ===== */
        @media (max-width: 600px) {
            .migration-card {
                padding: 32px 24px 28px;
                border-radius: 28px;
            }
            .logo-area .brand {
                font-size: 20px;
            }
            .logo-area img {
                height: 38px;
            }
            .migration-card h1 {
                font-size: 20px;
            }
            .migration-icon {
                font-size: 42px;
            }
            .btn-migrate {
                padding: 14px 28px;
                font-size: 15px;
                width: 100%;
                justify-content: center;
            }
            .migration-card .old-url,
            .migration-card .new-url {
                font-size: 12px;
                padding: 3px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="migration-card" id="migrationCard">

        <!-- Logo -->
        <div class="logo-area">
            <img src="https://i.postimg.cc/HxVC7TcN/IMG-8863.png" alt="梁喆同學工作室" />
            <span class="brand"><i class="fas fa-cloud-upload-alt"></i> 輕盤</span>
        </div>

        <!-- 圖標 -->
        <span class="migration-icon">
            <i class="fas fa-arrow-right-to-bracket"></i>
        </span>

        <!-- 標題 -->
        <h1>網站已遷移至 <span class="highlight">新地址</span></h1>

        <!-- 舊網址 -->
        <div class="old-url" id="oldUrlDisplay">
            <i class="fas fa-archive"></i> 舊站：oscar114515.github.io/Apple/
        </div>

        <!-- 箭頭 -->
        <span class="arrow-icon"><i class="fas fa-arrow-down"></i></span>

        <!-- 新網址 -->
        <div class="new-url" id="newUrlDisplay">
            <i class="fas fa-rocket"></i> 新站：oscar114515.github.io/qing-pan/
        </div>

        <!-- 跳轉按鈕 -->
        <a href="#" class="btn-migrate" id="migrateBtn">
            <i class="fas fa-arrow-right"></i> 前往新網站
        </a>

        <!-- 自動跳轉資訊 -->
        <div class="auto-redirect-info">
            <span id="countdownText">⏳ 將在 <span class="countdown" id="countdownNum">5</span> 秒後自動跳轉</span>
        </div>

    </div>

    <div class="footer-note">
        所有分享連結將會自動轉向新網站 · 資料完整保留
    </div>

    <script>
        // ============================================================
        // 舊網站遷移頁面（自動跳轉 + 保留參數）
        // ============================================================

        (function() {
            // 新網站基礎網址
            const NEW_BASE = 'https://oscar114515.github.io/qing-pan/';

            // 獲取當前 URL 的所有參數（如 ?download=xxx）
            const currentParams = window.location.search;
            const currentHash = window.location.hash;

            // 建構新網址（保留所有參數和 hash）
            let newUrl = NEW_BASE;
            if (currentParams) {
                newUrl += currentParams;
            }
            if (currentHash) {
                newUrl += currentHash;
            }

            // 更新按鈕連結
            document.getElementById('migrateBtn').href = newUrl;

            // 顯示新舊網址（美化顯示）
            const oldDisplay = document.getElementById('oldUrlDisplay');
            const newDisplay = document.getElementById('newUrlDisplay');

            // 提取路徑部分顯示
            const oldPath = window.location.hostname + window.location.pathname;
            const newPath = 'oscar114515.github.io/qing-pan/';

            oldDisplay.innerHTML = `<i class="fas fa-archive"></i> 舊站：${oldPath}`;
            newDisplay.innerHTML = `<i class="fas fa-rocket"></i> 新站：${newPath}`;

            // ===== 自動倒數跳轉 =====
            let countdown = 5;
            const countdownEl = document.getElementById('countdownNum');

            function updateCountdown() {
                countdownEl.textContent = countdown;
                if (countdown <= 0) {
                    // 跳轉到新網站
                    window.location.href = newUrl;
                    return;
                }
                countdown--;
                setTimeout(updateCountdown, 1000);
            }

            // 如果用戶點擊按鈕，停止倒數（但還是會跳轉）
            document.getElementById('migrateBtn').addEventListener('click', function(e) {
                // 讓瀏覽器正常跳轉，不阻止默認行為
                // 但我們不想讓倒數干擾，所以清除計時器
                // 但由於我們是直接跳轉，不需要額外處理
            });

            // 啟動倒數
            setTimeout(updateCountdown, 800);

            // ===== 如果 URL 中有 download 參數，提示用戶 =====
            const params = new URLSearchParams(currentParams);
            if (params.has('download')) {
                const shortCode = params.get('download');
                // 在頁面中顯示正在處理下載連結
                const subText = document.querySelector('.migration-card .sub');
                if (subText) {
                    subText.innerHTML =
                        `📥 偵測到分享連結 <strong style="color:#1e5ef7;">${shortCode}</strong><br />將自動轉向新站下載`;
                }
            }

            console.log('📦 輕盤遷移頁面已載入');
            console.log('🔄 將跳轉至:', newUrl);

        })();
    </script>

</body>
</html>
