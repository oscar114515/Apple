<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>🍎 苹果网盘</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        /* ===== 白色精美 UI ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 20px;
            color: #1a1a2e;
        }
        .app {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 32px 36px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.02);
            position: relative;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #0b0b1a;
        }
        .logo i {
            font-size: 28px;
            color: #1e5ef7;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-badge {
            display: none;
            background: #1e5ef7;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .admin-badge.show {
            display: inline-block;
        }
        .exit-admin-btn,
        .logout-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: #4a5a6e;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .exit-admin-btn.show,
        .logout-btn.show {
            display: inline-block;
        }
        .exit-admin-btn:hover,
        .logout-btn:hover {
            background: #f1f4f9;
        }
        #adminSecretBtn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid #eef2f6;
            color: #c8d0dc;
            font-size: 13px;
            cursor: pointer;
            opacity: 0.5;
        }
        #adminSecretBtn:hover {
            opacity: 1;
        }
        .subtitle {
            color: #8a98aa;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* 认证表单 */
        .auth-container {
            max-width: 400px;
            margin: 0 auto 24px;
        }
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: #f4f6fa;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 30px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            color: #6a7a8e;
            border: none;
            background: transparent;
        }
        .auth-tab.active {
            background: white;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .auth-form.active {
            display: flex;
        }
        .auth-form input {
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            background: #fafcff;
            transition: 0.2s;
            outline: none;
        }
        .auth-form input:focus {
            border-color: #1e5ef7;
            box-shadow: 0 0 0 3px rgba(30, 94, 247, 0.08);
        }
        .auth-form button {
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            background: #1e5ef7;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-form button:hover {
            background: #2b6af7;
        }
        .auth-form .toggle-link {
            text-align: center;
            font-size: 14px;
            color: #1e5ef7;
            cursor: pointer;
            margin-top: 4px;
        }
        .auth-form .toggle-link:hover {
            text-decoration: underline;
        }
        .auth-form .error-msg {
            color: #b91c1c;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .auth-form .error-msg.show {
            display: block;
        }

        /* 其他元素复用之前样式 */
        #status {
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        #status.show {
            display: block;
        }
        #status.success {
            background: #ecfdf3;
            color: #0f7b3a;
            border: 1px solid #b8e0c4;
        }
        #status.error {
            background: #fef3f2;
            color: #b91c1c;
            border: 1px solid #fcd3d0;
        }
        #status.info {
            background: #f0f7ff;
            color: #1a5bbf;
            border: 1px solid #c5d9f5;
        }

        .upload-card {
            background: #fafcff;
            border: 2px dashed #dce3ec;
            border-radius: 28px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            margin-bottom: 24px;
        }
        .upload-card:hover {
            border-color: #1e5ef7;
            background: #f5f9ff;
            transform: translateY(-2px);
        }
        .upload-card .icon {
            font-size: 48px;
            color: #1e5ef7;
            display: block;
            margin-bottom: 8px;
        }
        .upload-card p {
            font-weight: 500;
            color: #3d4a5e;
        }
        .upload-card .hint {
            font-size: 13px;
            color: #9aabbe;
        }
        #fileInput {
            display: none;
        }

        .upload-success {
            background: #ecfdf3;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #b8e0c4;
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 16px;
        }
        .upload-success.show {
            display: flex;
        }
        .upload-success .file-info {
            flex: 1;
        }
        .upload-success .file-name {
            font-weight: 600;
            font-size: 15px;
            color: #0b2b1a;
        }
        .upload-success .file-meta {
            font-size: 13px;
            color: #3e7352;
        }
        .upload-success .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .upload-success .actions button {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-download-sm {
            background: #1e5ef7;
            color: white;
        }
        .btn-download-sm:hover {
            background: #2b6af7;
        }
        .btn-copy-sm {
            background: #e8effb;
            color: #1e5ef7;
        }
        .btn-copy-sm:hover {
            background: #d4e2fa;
        }
        .btn-close-sm {
            background: transparent;
            color: #6a7a8e;
            border: 1px solid #dce3ec;
        }
        .btn-close-sm:hover {
            background: #f1f4f9;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .file-count {
            font-size: 14px;
            font-weight: 500;
            color: #5a6a7e;
        }
        .file-count span {
            background: #eef2f6;
            padding: 0 10px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 6px;
        }

        #fileList {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #fafcff;
            border-radius: 18px;
            transition: 0.2s;
            border: 1px solid transparent;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .file-item:hover {
            background: #f5f8fe;
            border-color: #e8effb;
        }
        .file-item .info {
            flex: 1;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .file-item .info .icon {
            font-size: 22px;
            width: 36px;
            text-align: center;
            opacity: 0.7;
        }
        .file-item .info .name {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
        }
        .file-item .info .meta {
            font-size: 12px;
            color: #8a98aa;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
        }
        .file-item .info .short-link {
            font-size: 12px;
            color: #1e5ef7;
            background: #eef4fe;
            padding: 0 12px;
            border-radius: 30px;
            display: inline-block;
            word-break: break-all;
        }
        .file-item .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .file-item .actions button {
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: #eef2f6;
            color: #3d4a5e;
        }
        .file-item .actions button:hover {
            background: #e2e8f0;
        }
        .file-item .actions .download-btn {
            background: #1e5ef7;
            color: white;
        }
        .file-item .actions .download-btn:hover {
            background: #2b6af7;
        }
        .file-item .actions .delete-btn {
            background: #fee9e7;
            color: #b91c1c;
        }
        .file-item .actions .delete-btn:hover {
            background: #fcd3d0;
        }

        .empty-state {
            color: #9aabbe;
            text-align: center;
            padding: 40px 0;
            font-size: 15px;
        }

        .download-page {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .download-page .big-icon {
            font-size: 72px;
            margin-bottom: 8px;
        }
        .download-page h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .download-page .meta {
            color: #8a98aa;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .download-page .btn-download-big {
            background: #1e5ef7;
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(30, 94, 247, 0.25);
            transition: 0.2s;
        }
        .download-page .btn-download-big:hover {
            background: #2b6af7;
            transform: translateY(-2px);
        }
        .download-page .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #8a98aa;
            text-decoration: none;
            font-size: 14px;
        }
        .download-page .back-link:hover {
            color: #1e5ef7;
        }

        .debug-box {
            background: #f4f6fa;
            border-radius: 14px;
            padding: 12px 16px;
            margin-top: 18px;
            font-family: monospace;
            font-size: 12px;
            color: #5a6a7e;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            border: 1px solid #e8edf4;
        }
        .debug-box.show {
            display: block;
        }
        .debug-box.error {
            border-color: #fcd3d0;
            background: #fef3f2;
            color: #b91c1c;
        }
        .debug-box.success {
            border-color: #b8e0c4;
            background: #ecfdf3;
            color: #0f7b3a;
        }
        .debug-box.info {
            border-color: #c5d9f5;
            background: #f0f7ff;
            color: #1a5bbf;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 40px;
            padding: 36px 32px 32px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .modal-box h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .modal-box .modal-sub {
            color: #8a98aa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            background: #fafcff;
            outline: none;
            transition: 0.2s;
        }
        .modal-box input:focus {
            border-color: #1e5ef7;
            box-shadow: 0 0 0 3px rgba(30, 94, 247, 0.08);
        }
        .modal-box button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #1e5ef7;
            color: white;
        }
        .modal-box button:hover {
            background: #2b6af7;
        }
        .modal-box .error-msg {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .modal-box .error-msg.show {
            display: block;
        }
        .modal-box .cancel-btn {
            background: transparent;
            color: #8a98aa;
            margin-top: 8px;
            font-weight: 450;
        }
        .modal-box .cancel-btn:hover {
            background: #f1f4f9;
        }

        @media (max-width: 600px) {
            .app {
                padding: 20px 16px 28px;
                border-radius: 28px;
            }
            .auth-container {
                max-width: 100%;
            }
            .upload-card {
                padding: 32px 16px;
            }
            .file-item {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">

        <!-- 顶栏 -->
        <div class="topbar">
            <div class="logo"><i>🍎</i><span>蘋果網盤</span></div>
            <div class="topbar-actions">
                <span class="admin-badge" id="adminBadge">👑 管理員</span>
                <button class="exit-admin-btn" id="exitAdminBtn" onclick="exitAdmin()">退出管理</button>
                <button class="logout-btn" id="logoutBtn" onclick="logout()">登出</button>
                <button id="adminSecretBtn" onclick="adminSecretClick()">⋅⋅⋅</button>
            </div>
        </div>
        <div class="subtitle" id="userStatus">📤 請登入以使用完整功能</div>

        <!-- 状态 -->
        <div id="status"></div>

        <!-- ===== 认证区 ===== -->
        <div id="authContainer" class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="email">電子郵件</button>
                <button class="auth-tab" data-tab="phone">手機簡訊</button>
            </div>

            <!-- 邮箱登录/注册 -->
            <div class="auth-form active" id="emailForm">
                <input type="email" id="emailInput" placeholder="電子郵件" />
                <input type="password" id="passwordInput" placeholder="密碼 (至少6位)" />
                <button id="emailActionBtn">登入</button>
                <div class="toggle-link" id="toggleEmailMode">還沒有帳號？註冊</div>
                <div class="error-msg" id="emailError"></div>
            </div>

            <!-- 手机短信登录 -->
            <div class="auth-form" id="phoneForm">
                <input type="tel" id="phoneInput" placeholder="手機號碼 (含國碼, 如 +886 912345678)" />
                <button id="sendCodeBtn">發送驗證碼</button>
                <input type="text" id="codeInput" placeholder="驗證碼" style="margin-top:8px;" />
                <button id="verifyCodeBtn">驗證並登入</button>
                <div class="error-msg" id="phoneError"></div>
            </div>
        </div>

        <!-- ===== 主界面 (登录后显示) ===== -->
        <div id="mainUI" style="display:none;">
            <div class="upload-card" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <span class="icon">📤</span>
                <p>點擊或拖曳上傳檔案</p>
                <div class="hint">所有檔案類型 · 無大小限制</div>
            </div>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)" />

            <div class="upload-success" id="uploadSuccess">
                <div class="file-info">
                    <div class="file-name" id="successFileName">檔案名稱</div>
                    <div class="file-meta" id="successFileMeta">大小 · 剛剛上傳</div>
                </div>
                <div class="actions">
                    <button class="btn-download-sm" onclick="downloadSuccessFile()">⬇️ 下載</button>
                    <button class="btn-copy-sm" onclick="copySuccessLink()">📋 複製連結</button>
                    <button class="btn-close-sm" onclick="document.getElementById('uploadSuccess').classList.remove('show')">✕</button>
                </div>
            </div>

            <div class="list-header">
                <div class="file-count">📁 共 <span id="fileCountNum">0</span> 個檔案</div>
            </div>
            <div id="fileList">
                <div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>
            </div>
        </div>

        <!-- ===== 下載頁面 ===== -->
        <div id="downloadUI" style="display:none;">
            <div class="download-page">
                <div class="big-icon" id="downloadIcon">📄</div>
                <h2 id="downloadFileName">檔案名稱</h2>
                <div class="meta" id="downloadFileMeta">大小 · 公開分享</div>
                <button class="btn-download-big" id="directDownloadBtn" onclick="directDownload()">⬇️ 立即下載</button>
                <div style="margin-top:8px;font-size:13px;color:#9aabbe;">⚡ 全速下載 · 無需登入</div>
                <div id="debugBox" class="debug-box"></div>
                <a href="#" class="back-link" id="backHomeLink">← 返回首頁</a>
            </div>
        </div>
    </div>

    <!-- ===== 管理員登入模態框 ===== -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h2>🔐 管理員登入</h2>
            <div class="modal-sub">請輸入管理員憑證</div>
            <input type="text" id="adminUser" placeholder="帳號" />
            <input type="password" id="adminPass" placeholder="密碼" />
            <button onclick="adminLogin()">登入</button>
            <div class="error-msg" id="adminError">帳號或密碼錯誤</div>
            <button class="cancel-btn" onclick="document.getElementById('adminModal').classList.remove('show')">取消</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <script>
        // ============================================================
        // Firebase 配置（你的项目）
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBKSHBZO-q_0Xl6p49PEVXX5QvXQwzA_Jo",
            authDomain: "mpox-6dcfe.firebaseapp.com",
            databaseURL: "https://mpox-6dcfe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mpox-6dcfe",
            storageBucket: "mpox-6dcfe.firebasestorage.app",
            messagingSenderId: "50859850749",
            appId: "1:50859850749:web:ada6bba4cd74b1923e3794",
            measurementId: "G-PECMD0ZEFJ"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ============================================================
        // 全局狀態
        // ============================================================
        let currentUser = null;
        let isAdmin = false;
        let adminClickCount = 0;
        let adminClickTimer = null;
        let lastUploaded = { fileName: '', fileSize: 0, downloadURL: '', shortLink: '' };
        let isEmailLogin = true; // true=登入, false=註冊

        // ============================================================
        // DOM 元素
        // ============================================================
        const authContainer = document.getElementById('authContainer');
        const mainUI = document.getElementById('mainUI');
        const downloadUI = document.getElementById('downloadUI');
        const statusEl = document.getElementById('status');
        const userStatus = document.getElementById('userStatus');
        const logoutBtn = document.getElementById('logoutBtn');

        // 邮箱表单
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const emailActionBtn = document.getElementById('emailActionBtn');
        const toggleEmailMode = document.getElementById('toggleEmailMode');
        const emailError = document.getElementById('emailError');

        // 手机表单
        const phoneInput = document.getElementById('phoneInput');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const codeInput = document.getElementById('codeInput');
        const verifyCodeBtn = document.getElementById('verifyCodeBtn');
        const phoneError = document.getElementById('phoneError');

        // 切换标签
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(target + 'Form').classList.add('active');
                // 清除错误
                emailError.classList.remove('show');
                phoneError.classList.remove('show');
            });
        });

        // ============================================================
        // 工具函数
        // ============================================================
        function showStatus(text, type = 'info') {
            statusEl.textContent = text;
            statusEl.className = 'show ' + type;
        }

        function hideStatus() {
            statusEl.className = '';
        }

        function copyLink(link) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => alert('✅ 連結已複製！\n' + link))
                    .catch(() => prompt('請手動複製：', link));
            } else {
                prompt('請手動複製：', link);
            }
        }

        // 下載檔案 (不跳轉)
        async function downloadFileDirect(url, fileName) {
            if (!fileName) fileName = url.split('/').pop() || '下載檔案';
            const btn = document.activeElement;
            try {
                if (btn) { btn.textContent = '⏳';
                    btn.disabled = true; }
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const blob = await resp.blob();
                const objUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = objUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(objUrl), 5000);
                if (btn) { btn.textContent = '✅';
                    setTimeout(() => { btn.textContent = '⬇️ 下載';
                        btn.disabled = false; }, 1500); }
            } catch (e) {
                alert('下載失敗: ' + e.message);
                if (btn) { btn.textContent = '⬇️ 下載';
                    btn.disabled = false; }
            }
        }

        // ============================================================
        // 認證功能
        // ============================================================

        // 監聽登入狀態
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                authContainer.style.display = 'none';
                mainUI.style.display = 'block';
                logoutBtn.classList.add('show');
                userStatus.textContent = `👤 已登入: ${user.email || user.phoneNumber || user.uid}`;
                showStatus('✅ 登入成功', 'success');
                loadFileList();
            } else {
                currentUser = null;
                authContainer.style.display = 'block';
                mainUI.style.display = 'none';
                logoutBtn.classList.remove('show');
                userStatus.textContent = '📤 請登入以使用完整功能';
                // 如果不在下載頁面，顯示登入
                const params = new URLSearchParams(window.location.search);
                if (!params.get('download')) {
                    downloadUI.style.display = 'none';
                }
            }
        });

        // 登出
        function logout() {
            auth.signOut();
            showStatus('已登出', 'info');
        }

        // 郵箱登入/註冊切換
        let emailMode = 'login'; // login / register
        toggleEmailMode.addEventListener('click', function() {
            if (emailMode === 'login') {
                emailMode = 'register';
                emailActionBtn.textContent = '註冊';
                this.textContent = '已有帳號？登入';
            } else {
                emailMode = 'login';
                emailActionBtn.textContent = '登入';
                this.textContent = '還沒有帳號？註冊';
            }
            emailError.classList.remove('show');
        });

        emailActionBtn.addEventListener('click', function() {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) {
                emailError.textContent = '請填寫完整資訊';
                emailError.classList.add('show');
                return;
            }
            if (password.length < 6) {
                emailError.textContent = '密碼至少6位';
                emailError.classList.add('show');
                return;
            }
            emailError.classList.remove('show');
            this.disabled = true;
            this.textContent = '處理中...';

            const action = emailMode === 'login' ? auth.signInWithEmailAndPassword(email, password) :
                auth.createUserWithEmailAndPassword(email, password);
            action.then(() => {
                // 成功後由 onAuthStateChanged 處理
            }).catch(err => {
                emailError.textContent = err.message;
                emailError.classList.add('show');
                this.disabled = false;
                this.textContent = emailMode === 'login' ? '登入' : '註冊';
            });
        });

        // ============================================================
        // 手機簡訊驗證
        // ============================================================
        let confirmationResult = null;

        sendCodeBtn.addEventListener('click', function() {
            const phone = phoneInput.value.trim();
            if (!phone) {
                phoneError.textContent = '請輸入手機號碼 (含國碼)';
                phoneError.classList.add('show');
                return;
            }
            phoneError.classList.remove('show');
            this.disabled = true;
            this.textContent = '發送中...';

            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then(conf => {
                    confirmationResult = conf;
                    sendCodeBtn.textContent = '已發送';
                    showStatus('✅ 驗證碼已發送，請檢查手機', 'success');
                })
                .catch(err => {
                    phoneError.textContent = err.message;
                    phoneError.classList.add('show');
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '發送驗證碼';
                });
        });

        verifyCodeBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            if (!code) {
                phoneError.textContent = '請輸入驗證碼';
                phoneError.classList.add('show');
                return;
            }
            if (!confirmationResult) {
                phoneError.textContent = '請先發送驗證碼';
                phoneError.classList.add('show');
                return;
            }
            phoneError.classList.remove('show');
            this.disabled = true;
            this.textContent = '驗證中...';

            confirmationResult.confirm(code)
                .then(() => {
                    // 成功
                })
                .catch(err => {
                    phoneError.textContent = err.message;
                    phoneError.classList.add('show');
                    verifyCodeBtn.disabled = false;
                    verifyCodeBtn.textContent = '驗證並登入';
                });
        });

        // 初始化 reCAPTCHA (用於手機驗證)
        let recaptchaVerifier = null;
        window.onload = function() {
            // 只有當手機標籤存在時才初始化 reCAPTCHA
            recaptchaVerifier = new firebase.auth.RecaptchaVerifier('sendCodeBtn', {
                size: 'invisible',
                callback: () => {}
            });
            recaptchaVerifier.render();

            // 處理分享連結
            handleShareLink();
            const params = new URLSearchParams(window.location.search);
            if (!params.get('download')) {
                // 如果未登入，顯示登入表單
                if (!auth.currentUser) {
                    // 已經顯示
                }
            }
        };

        // ============================================================
        // 上傳檔案（關聯用戶 UID）
        // ============================================================
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!currentUser) {
                alert('請先登入');
                return;
            }
            showStatus('⏳ 上傳中...', 'info');
            document.getElementById('uploadArea').style.opacity = '0.6';

            try {
                const ext = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
                const filePath = `files/${currentUser.uid}/${fileName}`; // 按用戶存儲

                const uploadTask = storage.ref(filePath).put(file);
                await uploadTask;
                const downloadURL = await storage.ref(filePath).getDownloadURL();

                const shortCode = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
                const shortLink = window.location.origin + window.location.pathname + '?download=' + shortCode;

                // 儲存 Firestore
                await db.collection('files').add({
                    fileName: file.name,
                    fileSize: file.size,
                    fileType: file.type || 'unknown',
                    downloadURL: downloadURL,
                    shortCode: shortCode,
                    uploaderUid: currentUser.uid,
                    uploaderEmail: currentUser.email || currentUser.phoneNumber || '手機用戶',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    downloadCount: 0
                });

                lastUploaded = { fileName: file.name, fileSize: file.size, downloadURL, shortLink };
                const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                document.getElementById('successFileName').textContent = file.name;
                document.getElementById('successFileMeta').textContent = `${sizeMB} MB · 剛剛上傳`;
                document.getElementById('uploadSuccess').classList.add('show');
                showStatus('✅ 上傳成功！', 'success');
                loadFileList();
            } catch (err) {
                showStatus('❌ 上傳失敗: ' + err.message, 'error');
                alert('上傳失敗: ' + err.message);
            } finally {
                document.getElementById('uploadArea').style.opacity = '1';
                document.getElementById('fileInput').value = '';
            }
        }

        function downloadSuccessFile() {
            if (lastUploaded.downloadURL) downloadFileDirect(lastUploaded.downloadURL, lastUploaded.fileName);
            else alert('沒有可下載的檔案');
        }

        function copySuccessLink() {
            if (lastUploaded.shortLink) copyLink(lastUploaded.shortLink);
            else alert('沒有可複製的連結');
        }

        // ============================================================
        // 載入檔案列表（根據用戶 UID 或管理員）
        // ============================================================
        async function loadFileList() {
            if (!currentUser && !isAdmin) {
                document.getElementById('fileList').innerHTML = '<div class="empty-state">請登入查看檔案</div>';
                document.getElementById('fileCountNum').textContent = '0';
                return;
            }
            try {
                let query = db.collection('files');
                if (!isAdmin) {
                    query = query.where('uploaderUid', '==', currentUser.uid);
                }
                const snapshot = await query.orderBy('createdAt', 'desc').get();
                const count = snapshot.size;
                document.getElementById('fileCountNum').textContent = count;

                const container = document.getElementById('fileList');
                if (count === 0) {
                    container.innerHTML = '<div class="empty-state">📭 還沒有檔案，快來上傳第一個吧！</div>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const f = doc.data();
                    const sizeMB = (f.fileSize / 1024 / 1024).toFixed(1);
                    const shortLink = window.location.origin + window.location.pathname + '?download=' + f.shortCode;
                    const time = f.createdAt ? f.createdAt.toDate().toLocaleDateString() : '';
                    const uploaderInfo = isAdmin ? ` · 上傳者: ${f.uploaderEmail || '匿名'}` : '';

                    html += `
                        <div class="file-item">
                            <div class="info">
                                <div class="icon">📄</div>
                                <div>
                                    <div class="name">${f.fileName}</div>
                                    <div class="meta">${sizeMB} MB · ${f.downloadCount || 0} 次下載 · ${time}${uploaderInfo}</div>
                                    <div class="short-link">🔗 ${shortLink}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button onclick="copyLink('${shortLink}')">複製</button>
                                <button class="download-btn" onclick="downloadFileDirect('${f.downloadURL}', '${f.fileName}')">⬇️ 下載</button>
                                ${isAdmin ? `<button class="delete-btn" onclick="deleteFile('${doc.id}')">🗑️ 刪除</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('fileList').innerHTML = '<div class="empty-state" style="color:#b91c1c;">❌ 載入失敗: ' + err
                    .message + '</div>';
            }
        }

        // 刪除檔案（管理員）
        async function deleteFile(docId) {
            if (!confirm('確定要刪除這個檔案嗎？此動作無法復原！')) return;
            try {
                const doc = await db.collection('files').doc(docId).get();
                const data = doc.data();
                if (data && data.downloadURL) {
                    const ref = storage.refFromURL(data.downloadURL);
                    await ref.delete();
                }
                await db.collection('files').doc(docId).delete();
                showStatus('🗑️ 檔案已刪除', 'success');
                loadFileList();
            } catch (err) {
                alert('刪除失敗: ' + err.message);
            }
        }

        // ============================================================
        // 分享連結處理（下載頁面）
        // ============================================================
        async function handleShareLink() {
            const params = new URLSearchParams(window.location.search);
            const shortCode = params.get('download');
            const debugBox = document.getElementById('debugBox');

            // 管理員入口 ?admin
            if (params.has('admin')) {
                document.getElementById('mainUI').style.display = 'none';
                document.getElementById('downloadUI').style.display = 'none';
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminUser').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminError').classList.remove('show');
                return;
            }

            if (!shortCode) {
                // 如果用戶已登入，顯示主界面；否則顯示登入
                if (auth.currentUser) {
                    document.getElementById('mainUI').style.display = 'block';
                    document.getElementById('downloadUI').style.display = 'none';
                } else {
                    document.getElementById('mainUI').style.display = 'none';
                    document.getElementById('downloadUI').style.display = 'none';
                    authContainer.style.display = 'block';
                }
                return;
            }

            // 有短碼，顯示下載頁面
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('downloadUI').style.display = 'block';
            authContainer.style.display = 'none';

            debugBox.className = 'debug-box show info';
            debugBox.textContent = `🔍 查詢短碼: ${shortCode} ...`;

            try {
                const snapshot = await db.collection('files').where('shortCode', '==', shortCode).get();
                if (snapshot.empty) {
                    debugBox.className = 'debug-box show error';
                    debugBox.textContent = `❌ 找不到短碼: ${shortCode}\n可能原因：檔案已被刪除或短碼錯誤。`;
                    document.getElementById('downloadFileName').textContent = '❌ 檔案不存在';
                    document.getElementById('downloadFileMeta').textContent = '連結可能已過期';
                    document.getElementById('directDownloadBtn').style.display = 'none';
                    document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
                    return;
                }
                const data = snapshot.docs[0].data();
                const docId = snapshot.docs[0].id;

                // 更新下載次數
                await db.collection('files').doc(docId).update({
                    downloadCount: firebase.firestore.FieldValue.increment(1)
                });

                debugBox.className = 'debug-box show success';
                debugBox.textContent = `✅ 找到檔案: ${data.fileName}`;

                const sizeMB = (data.fileSize / 1024 / 1024).toFixed(1);
                document.getElementById('downloadFileName').textContent = data.fileName;
                document.getElementById('downloadFileMeta').textContent =
                    `${sizeMB} MB · 公開分享 · 下載 ${data.downloadCount || 0} 次`;
                document.getElementById('directDownloadBtn').style.display = 'inline-block';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;

                window._downloadURL = data.downloadURL;
                window._downloadFileName = data.fileName;

            } catch (err) {
                debugBox.className = 'debug-box show error';
                debugBox.textContent = `❌ 載入失敗: ${err.message}`;
                document.getElementById('downloadFileName').textContent = '❌ 載入失敗';
                document.getElementById('downloadFileMeta').textContent = err.message;
                document.getElementById('directDownloadBtn').style.display = 'none';
                document.getElementById('backHomeLink').href = window.location.origin + window.location.pathname;
            }
        }

        function directDownload() {
            if (window._downloadURL && window._downloadFileName) {
                downloadFileDirect(window._downloadURL, window._downloadFileName);
            } else {
                alert('無法下載，請重新整理頁面');
            }
        }

        // ============================================================
        // 管理員
        // ============================================================
        function adminLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if (user === 'admin' && pass === '7891') {
                document.getElementById('adminModal').classList.remove('show');
                isAdmin = true;
                document.getElementById('adminBadge').classList.add('show');
                document.getElementById('exitAdminBtn').classList.add('show');
                showStatus('👑 管理員模式已啟用', 'success');
                // 強制顯示主界面
                document.getElementById('mainUI').style.display = 'block';
                document.getElementById('downloadUI').style.display = 'none';
                authContainer.style.display = 'none';
                loadFileList();
            } else {
                document.getElementById('adminError').classList.add('show');
            }
        }

        function exitAdmin() {
            isAdmin = false;
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('exitAdminBtn').classList.remove('show');
            showStatus('已退出管理員模式', 'info');
            // 重新載入用戶自己的檔案
            loadFileList();
        }

        function adminSecretClick() {
            adminClickCount++;
            clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000);
            if (adminClickCount >= 3) {
                adminClickCount = 0;
                document.getElementById('adminModal').classList.add('show');
                document.getElementById('adminError').classList.remove('show');
                document.getElementById('adminUser').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPass').focus();
            }
        }

        // ============================================================
        // 拖曳支援
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const area = document.getElementById('uploadArea');
            if (area) {
                area.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#1e5ef7';
                    this.style.background = '#f5f9ff';
                });
                area.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#dce3ec';
                    this.style.background = '#fafcff';
                });
                area.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#dce3ec';
                    this.style.background = '#fafcff';
                    if (e.dataTransfer.files.length > 0) {
                        document.getElementById('fileInput').files = e.dataTransfer.files;
                        handleFileSelect({ target: document.getElementById('fileInput') });
                    }
                });
            }
        });

        // ============================================================
        // 啟動
        // ============================================================
        // 由於 onAuthStateChanged 已經處理，但需要確保初始狀態
        // 若已有登入用戶，會自動觸發
        console.log('🍎 蘋果網盤 - Firebase 完整版');
        console.log('🔑 管理員入口: ?admin');
    </script>
</body>
</html>
